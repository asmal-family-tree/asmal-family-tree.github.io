<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>شجرة العائلة</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
<style>
  :root{
    --bg:#FFFFFF; --line:#8a7a55; --ink:#241a10; --barh:64px;
    --root:#0B3D2E; --root-ring:#C9A227;
    --trunk:#8B4A1E; --trunk-ring:#5c2f10;
    --leaf:#0f5c46; --leaf-ring:#0b3d2e;
    --tagbg:#FFFDF6; --tagborder:#c9b077;
    --gold:#B8860B; --gold-soft:#EFDFAE; --gold-bright:#D4AF37;
    --emerald:#0B3D2E; --emerald-2:#124d3a; --maroon:#6b1f2a;
    --card-shadow:0 4px 18px rgba(60,40,10,.12);
    --card-shadow-lg:0 14px 36px rgba(20,15,5,.24);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{ margin:0; overscroll-behavior:none; }
  #ornateFrame{ position:fixed; inset:6px; z-index:30; pointer-events:none; border:2px solid var(--gold); box-shadow:0 0 0 6px var(--bg), 0 0 0 8px var(--emerald); border-radius:10px; }
  #artBackground{
    position:fixed; left:9px; right:9px; top:9px; bottom:calc(var(--barh,64px) + 3px); z-index:0; pointer-events:none; overflow:hidden;
    background:none; border-radius:8px;
  }
  header, #tree-wrap, #backdrop, #sheet, #infoBackdrop, #infoModal{ position:relative; z-index:1; }
  #bgImg{
    position:absolute; top:50%; left:50%; width:100%; height:100%; object-fit:cover; object-position:center center;
    transform:translate(-50%,-50%) scale(1); transform-origin:center center; display:none; touch-action:none;
    -webkit-user-drag:none; user-select:none; pointer-events:none;
  }
  #bgImg.movable{ pointer-events:auto; cursor:grab; }
  #bgImg.movable:active{ cursor:grabbing; }
  #bgPanel .io-row{
    background:#fff; border:1.3px solid #E6DCC7; border-radius:18px; padding:14px;
    box-shadow:var(--card-shadow); display:flex; flex-direction:column; gap:10px;
  }
  #bgPanel button, #bgPanel label{
    background:linear-gradient(135deg,var(--trunk-ring),#6a2e0a); color:#fff; border:none; border-radius:11px;
    padding:11px; font-family:'Tajawal',sans-serif; font-weight:700; font-size:14px; cursor:pointer; text-align:center;
  }
  #bgPanel .bg-zoom-row{ display:flex; gap:8px; }
  #bgPanel .bg-zoom-row button{ flex:1; padding:9px; font-size:16px; }
  #bgMoveToggle.active{ background:var(--emerald); }
  #bgPanel .bg-hint{ font-size:12px; color:#8a7a55; text-align:center; }
  body{ background:var(--bg); font-family:'Tajawal',sans-serif; color:var(--ink); min-height:100vh; }
  header{
    position:sticky; top:0; z-index:20; background:linear-gradient(180deg, var(--emerald) 0%, var(--emerald-2) 100%);
    padding:18px 14px 14px; text-align:center; border-bottom:3px double var(--gold-bright);
    box-shadow:0 3px 14px rgba(11,61,46,.35);
  }
  h1{ font-family:'Amiri',serif; font-weight:700; font-size:22px; margin:0 0 12px; color:var(--gold-bright); letter-spacing:.3px; text-shadow:0 1px 2px rgba(0,0,0,.35); }
  h1::after{ content:"❖"; display:block; font-size:12px; color:var(--gold); margin:8px auto 0; }
  .searchbar{
    display:flex; align-items:center; gap:8px; background:#FFFDF6; border:1.4px solid var(--gold);
    border-radius:24px; padding:10px 18px; max-width:420px; margin:0 auto; box-shadow:var(--card-shadow);
    transition:border-color .15s, box-shadow .15s;
  }
  .searchbar:focus-within{ border-color:var(--gold); box-shadow:0 4px 18px rgba(201,151,31,.18); }
  .searchbar svg{ width:16px; height:16px; flex:none; opacity:.5; }
  #search{ flex:1; border:none; outline:none; background:transparent; font-family:'Tajawal',sans-serif; font-size:15px; text-align:right; color:var(--ink); }
  .rel-toggle{
    display:block; margin:12px auto 0; background:linear-gradient(180deg,#FFFDF6,#FBF3DE); border:1.4px solid var(--gold); border-radius:18px;
    padding:7px 18px; font-family:'Tajawal',sans-serif; font-size:12.5px; font-weight:700; color:var(--emerald); cursor:pointer;
    box-shadow:var(--card-shadow); transition:transform .12s, box-shadow .12s;
  }
  .rel-toggle:active{ transform:scale(.97); }
  .rel-panel{
    display:none; max-width:420px; margin:10px auto 0; background:#fff; border:1.3px solid #E6DCC7;
    border-radius:18px; padding:16px; text-align:right; box-shadow:var(--card-shadow);
  }
  .rel-panel.show{ display:block; }
  .rel-panel input{
    width:100%; box-sizing:border-box; margin-bottom:8px; padding:10px 13px; border-radius:11px;
    border:1.3px solid #E6E1D5; font-family:'Tajawal',sans-serif; font-size:14px; text-align:right; outline:none;
    background:#FBFAF6; transition:border-color .15s, box-shadow .15s;
  }
  .rel-panel input:focus{ border-color:var(--gold); box-shadow:0 0 0 3px rgba(201,151,31,.14); background:#fff; }
  .rel-panel button{
    width:100%; padding:11px; border:none; border-radius:11px; background:linear-gradient(135deg,var(--trunk-ring),#6a2e0a);
    color:#fff; font-family:'Tajawal',sans-serif; font-weight:700; font-size:14px; cursor:pointer;
    box-shadow:0 4px 14px rgba(139,62,16,.25); transition:transform .1s;
  }
  .rel-panel button:active{ transform:scale(.98); }
  #relResult{ margin-top:12px; font-size:13.5px; color:#333; line-height:1.9; min-height:1px; }
  #relResult .rel-title{ font-weight:700; color:var(--trunk-ring,#8B3E10); font-size:15px; background:var(--gold-soft); padding:8px 12px; border-radius:10px; display:inline-block; }
  #relResult .rel-note{ color:#999; font-size:12px; }
  .chain-grid{ direction:rtl; overflow-x:auto; margin-top:10px; padding-bottom:6px; }
  .chain-row{ display:flex; }
  .chain-cell{
    flex:0 0 auto; min-width:56px; text-align:center; font-size:12px; padding:6px 3px;
    color:#333; white-space:nowrap;
  }
  .chain-cell.dot{ color:#D8D0C0; }
  .chain-cell.lca{ font-weight:800; color:#fff; background:linear-gradient(135deg,var(--trunk-ring),#6a2e0a); border-radius:8px; }
  .chain-row.top .lca{ border-radius:8px 8px 0 0; }
  .chain-row.bottom .lca{ border-radius:0 0 8px 8px; margin-top:-1px; }
  .rel-steps{ margin-top:14px; font-size:13.5px; line-height:2.1; }
  .rel-steps .final{ font-weight:700; color:var(--trunk-ring,#8B3E10); margin-top:6px; background:var(--gold-soft); padding:8px 12px; border-radius:10px; }
  #tree-wrap{ position:relative; width:100%; height:100vh; min-height:420px; overflow:hidden; touch-action:none; cursor:grab; }
  #tree-wrap:active{ cursor:grabbing; }
  svg{ width:100%; height:100%; display:block; }
  .zoom-fab{ position:absolute; left:14px; bottom:calc(var(--barh, 64px) + 14px); display:flex; flex-direction:column; gap:10px; z-index:15; }
  .zoom-fab button{
    width:46px; height:46px; border-radius:50%; border:1px solid #EFE6D6; background:#fff; color:var(--trunk-ring); font-size:19px;
    box-shadow:var(--card-shadow); cursor:pointer; transition:transform .1s;
  }
  .zoom-fab button:active{ background:var(--gold-soft); transform:scale(.94); }

  #bottomBar{
    position:fixed; left:0; right:0; bottom:0; z-index:32; display:flex; align-items:center; justify-content:space-between;
    background:linear-gradient(180deg, var(--emerald-2) 0%, var(--emerald) 100%); border-top:3px double var(--gold-bright);
    padding:9px 4px calc(9px + env(safe-area-inset-bottom)); box-shadow:0 -3px 14px rgba(11,61,46,.35);
    overflow-x:auto;
  }
  #bottomBar button{
    background:transparent; border:1.3px solid transparent; border-radius:14px; color:var(--gold-bright);
    font-size:18px; line-height:1; padding:7px 8px; cursor:pointer; transition:transform .1s, background .15s; flex:0 0 auto;
  }
  #bottomBar button:active{ transform:scale(.92); }
  #bottomBar button.active{ background:rgba(212,175,55,.18); border-color:var(--gold-bright); }

  .bottom-panel{
    position:fixed; left:0; right:0; bottom:var(--barh, 64px); z-index:31;
    display:none; margin:0 auto; max-width:420px; padding:0 14px;
  }
  .bottom-panel.show{ display:block; }
  .rel-panel.bottom-panel, .bottom-panel .searchbar{ margin:0; max-width:none; }
  #ioPanel .io-row{
    background:#fff; border:1.3px solid #E6DCC7; border-radius:18px; padding:14px;
    box-shadow:var(--card-shadow); display:flex; flex-direction:column; gap:10px;
  }
  #ioPanel button, #ioPanel label{
    background:linear-gradient(135deg,var(--trunk-ring),#6a2e0a); color:#fff; border:none; border-radius:11px;
    padding:11px; font-family:'Tajawal',sans-serif; font-weight:700; font-size:14px; cursor:pointer; text-align:center;
  }



  .link{ fill:none; stroke:var(--line); stroke-width:1.6px; }
  .node{ cursor:pointer; }
  .node .hit{ fill:transparent; }
  .avatar-root{ fill:var(--root); stroke:var(--root-ring); stroke-width:3px; }
  .avatar-joinpoint{ fill:#241a10; stroke:var(--gold-bright); stroke-width:3.4px; }
  .avatar-trunk{ fill:var(--trunk); stroke:var(--trunk-ring); stroke-width:2.4px; }
  .avatar-leaf{ fill:var(--leaf); stroke:var(--leaf-ring); stroke-width:2.2px; }
  .avatar-trunk-red{ fill:#8B1E1E; stroke:#5C1212; stroke-width:2.4px; }
  .avatar-trunk-green{ fill:#1E7A4C; stroke:#12502F; stroke-width:2.4px; }
  .avatar-trunk-blue{ fill:#1E7A9C; stroke:#12506A; stroke-width:2.4px; }
  .avatar-trunk-gold{ fill:#B8860B; stroke:#7A5A08; stroke-width:2.4px; }
  .avatar-female{ fill:#E88BB0; stroke:#B14C74; stroke-width:2px; }
  .tree-hidden #tree-svg, .tree-hidden .zoom-fab, .tree-hidden #exitFocus{ display:none !important; }
  .glyph{ fill:#fff; opacity:.92; pointer-events:none; }
  .tag{ fill:var(--tagbg); stroke:var(--tagborder); stroke-width:1px; }
  .tag-text{ font-family:'Tajawal',sans-serif; font-weight:700; font-size:17px; text-anchor:middle; dominant-baseline:middle; fill:#1a1a1a; pointer-events:none; }
  .node.dim{ opacity:.2; }
  .ring{ fill:none; stroke:#D6262A; stroke-width:2.6px; opacity:0; }
  .ring.show{ opacity:1; }
  .link.dim{ opacity:.12; }
  .link.path-highlight{ stroke:#C9971F; stroke-width:4px; }
  .node.path-highlight .avatar-root, .node.path-highlight .avatar-trunk, .node.path-highlight .avatar-leaf,
  .node.path-highlight .avatar-trunk-red, .node.path-highlight .avatar-trunk-green, .node.path-highlight .avatar-trunk-blue{
    stroke:#C9971F; stroke-width:4px;
  }
  .node.path-highlight .tag{ stroke:#C9971F; stroke-width:2px; }

  #sheet{
    position:fixed; left:0; right:0; bottom:var(--barh, 64px); z-index:30; background:#FDFBF7; border-top:1px solid #EFE6D6;
    border-radius:24px 24px 0 0; box-shadow:var(--card-shadow-lg);
    padding:12px 22px 22px; transform:translateY(110%); transition:transform .3s cubic-bezier(.22,.9,.34,1);
    max-height:82vh; overflow-y:auto;
  }
  #sheet.show{ transform:translateY(0); }
  #sheet .handle{ width:40px; height:4px; background:#E6DCC7; border-radius:3px; margin:6px auto 14px; }
  #sheet h3{ margin:0 0 8px; font-family:'Amiri',serif; font-size:23px; color:var(--root); }
  #sheet .path{ font-size:13px; color:#7a6a4c; line-height:1.9; }
  #ip-card{ margin-top:16px; background:#fff; border-radius:16px; padding:14px 16px; box-shadow:var(--card-shadow); }
  #ip-card .ip-row{ display:flex; gap:8px; font-size:13.5px; padding:8px 0; border-bottom:1px solid #F3EEE2; }
  #ip-card .ip-row:last-child{ border-bottom:none; }
  #ip-card .ip-label{ color:#aaa; min-width:80px; }
  #ip-card .ip-value{ color:#222; font-weight:700; }
  #ip-card img.ip-photo{ max-width:140px; border-radius:12px; display:block; margin:2px 0 12px; box-shadow:var(--card-shadow); }
  #ip-card .ip-bio{ font-size:13px; color:#444; line-height:1.9; margin-top:10px; background:#FAF4E6; padding:12px 14px; border-radius:12px; }
  #ip-card .ip-notaries{ display:flex; flex-wrap:wrap; gap:6px; margin-top:6px; }
  #ip-card .ip-notary-chip{ background:#F1E9D8; border-radius:14px; padding:5px 12px; font-size:12px; color:#6a5636; font-weight:600; }
  #ip-card .ip-empty{ color:#bbb; font-size:12.5px; margin-top:10px; text-align:center; padding:8px 0; }
  #backdrop{ position:fixed; inset:0; background:rgba(20,14,8,.35); z-index:25; opacity:0; pointer-events:none; transition:opacity .2s; }
  #backdrop.show{ opacity:1; pointer-events:auto; }

  .node.path-hidden, .link.path-hidden{ display:none; }
  .exit-focus{
    position:absolute; top:14px; right:14px; z-index:16;
    background:linear-gradient(135deg,var(--trunk-ring),#6a2e0a); color:#fff; border:none; border-radius:20px;
    padding:9px 16px; font-family:'Tajawal',sans-serif; font-size:13px; font-weight:700;
    box-shadow:0 6px 16px rgba(139,62,16,.3); cursor:pointer; display:none;
  }
  .exit-focus.show{ display:block; }

  #toggleManual.active{ background:var(--trunk-ring); color:#fff; }
  .manual-mode .node{ cursor:grab; }
  .manual-mode .node:active{ cursor:grabbing; }

  .plus-badge circle{ fill:#fff; stroke:#8B3E10; stroke-width:1.6px; }
  .plus-badge text{ font-size:15px; font-weight:800; fill:#8B3E10; text-anchor:middle; dominant-baseline:middle; }
  .plus-badge{ cursor:pointer; }
  .minus-badge circle{ fill:#fff; stroke:#8B1E1E; stroke-width:1.6px; }
  .minus-badge text{ font-size:15px; font-weight:800; fill:#8B1E1E; text-anchor:middle; dominant-baseline:middle; }
  .minus-badge{ cursor:pointer; }
  .approve-badge circle{ fill:#fff; stroke:#1E7A4C; stroke-width:1.8px; }
  .approve-badge text{ font-size:14px; font-weight:800; fill:#1E7A4C; text-anchor:middle; dominant-baseline:middle; }
  .approve-badge{ cursor:pointer; }
  .reject-badge circle{ fill:#fff; stroke:#8B1E1E; stroke-width:1.8px; }
  .reject-badge text{ font-size:14px; font-weight:800; fill:#8B1E1E; text-anchor:middle; dominant-baseline:middle; }
  .reject-badge{ cursor:pointer; }
  .star-badge{ display:none; cursor:default; }
  .star-badge circle{ fill:#fff; stroke:#E08A00; stroke-width:1.6px; }
  .star-badge text{ font-size:15px; fill:#E08A00; text-anchor:middle; dominant-baseline:middle; }
  .node.is-focal .plus-badge, .node.is-focal .minus-badge{ display:none !important; }
  .role-limited .minus-badge{ display:none !important; }
  .node.is-focal .star-badge{ display:block !important; }
  .node.is-focal circle[class^="avatar-"]{ fill:#FF8C00 !important; stroke:#B0600A !important; }
  .node.is-focal .tag-text{ fill:#E07A00 !important; }
  #myTreeInfoPanel{
    position:fixed; top:70px; right:16px; z-index:60; background:#FFFFFF; border:1px solid #ddd;
    border-radius:12px; box-shadow:0 4px 18px rgba(0,0,0,0.15); padding:14px 16px; min-width:190px;
    font-family:'Tajawal',sans-serif; display:none;
  }
  #myTreeInfoPanel.show{ display:block; }
  #mtiClose{ position:absolute; top:6px; left:10px; cursor:pointer; font-size:15px; color:#999; }
  #mtiClose:hover{ color:#8B1E1E; }
  #myTreeInfoPanel h4{ margin:0 0 8px 0; font-size:16px; color:#241a10; text-align:center; }
  #currentUserBadge{
    position:fixed; top:10px; left:10px; z-index:55; background:rgba(255,253,246,0.95); border:1px solid #ddd;
    border-radius:20px; padding:5px 12px; font-family:'Tajawal',sans-serif; font-size:12px; color:#333;
    box-shadow:0 2px 8px rgba(0,0,0,0.12); display:none; align-items:center; gap:8px;
  }
  #currentUserBadge.show{ display:flex; }
  #currentUserBadge button{ border:none; background:#eee; border-radius:12px; padding:3px 8px; font-size:11px; cursor:pointer; color:#555; }
  #noViewMsg{
    position:fixed; inset:0; z-index:40; display:none; align-items:center; justify-content:center;
    background:#FFFFFF; font-family:'Tajawal',sans-serif; font-size:16px; color:#8B1E1E; text-align:center; padding:30px;
  }
  #noViewMsg.show{ display:flex; }
  #myTreeInfoPanel .mti-row{ font-size:14px; color:#444; margin:4px 0; display:flex; justify-content:space-between; gap:12px; }
  #myTreeInfoPanel button{
    width:100%; margin-top:10px; padding:8px; border:none; border-radius:8px; background:#B8860B;
    color:#fff; font-family:'Tajawal',sans-serif; font-weight:700; cursor:pointer;
  }
  #authOverlay{
    position:fixed; inset:0; z-index:200; background:linear-gradient(180deg,#0B3D2E 0%, #124d3a 100%);
    display:flex; align-items:center; justify-content:center; padding:20px;
  }
  #authOverlay.hidden{ display:none; }
  #authCard{
    background:#FFFDF6; border-radius:18px; padding:28px 24px; width:100%; max-width:360px;
    box-shadow:0 10px 40px rgba(0,0,0,.35); font-family:'Tajawal',sans-serif; text-align:center;
  }
  #authCard h2{ margin:0 0 4px 0; color:#0B3D2E; font-size:20px; }
  #authCard p.sub{ margin:0 0 20px 0; color:#888; font-size:13px; }
  #authCard input{
    width:100%; box-sizing:border-box; padding:11px 12px; margin-bottom:12px; border-radius:10px;
    border:1.5px solid #ddd; font-family:'Tajawal',sans-serif; font-size:15px; text-align:right;
  }
  #authCard button{
    width:100%; padding:12px; border:none; border-radius:10px; background:#0B3D2E; color:#fff;
    font-family:'Tajawal',sans-serif; font-weight:700; font-size:15px; cursor:pointer; margin-top:4px;
  }
  #authCard button.secondary{ background:transparent; color:#0B3D2E; text-decoration:underline; margin-top:10px; padding:6px; }
  #authError{ color:#8B1E1E; font-size:13px; margin-top:10px; min-height:18px; }
  #authLoading{ color:#888; font-size:13px; margin-top:10px; }

  #infoBackdrop{ position:fixed; inset:0; background:rgba(20,14,8,.45); z-index:45; opacity:0; pointer-events:none; transition:opacity .25s; backdrop-filter:blur(1px); }
  #infoBackdrop.show{ opacity:1; pointer-events:auto; }
  #infoModal{
    position:fixed; left:0; right:0; bottom:0; z-index:50; background:#FDFBF7;
    border-radius:24px 24px 0 0; box-shadow:var(--card-shadow-lg);
    max-height:90vh; display:flex; flex-direction:column;
    transform:translateY(110%); transition:transform .3s cubic-bezier(.22,.9,.34,1);
  }
  #infoModal.show{ transform:translateY(0); }
  #infoModal::before{
    content:""; display:block; width:40px; height:4px; background:#E6DCC7; border-radius:3px;
    margin:10px auto 0;
  }
  .info-modal-header{
    display:flex; justify-content:space-between; align-items:center;
    padding:10px 22px 10px; font-family:'Amiri',serif; font-size:19px; font-weight:700; color:var(--root);
  }
  #infoModalClose{
    font-family:'Tajawal',sans-serif; font-size:13px; color:#999; cursor:pointer;
    border:1px solid #E6DCC7; border-radius:14px; padding:4px 12px;
  }
  .info-tabs{ display:flex; gap:8px; padding:2px 18px 14px; }
  .info-tab{
    flex:1; border:none; background:#F1E9D8; color:#8a7550; padding:10px 6px; border-radius:14px;
    font-family:'Tajawal',sans-serif; font-size:12.5px; font-weight:700; cursor:pointer;
    transition:background .15s, color .15s, transform .1s;
  }
  .info-tab:active{ transform:scale(.97); }
  .info-tab.active{ background:linear-gradient(135deg,var(--trunk-ring),#6a2e0a); color:#fff; box-shadow:0 4px 14px rgba(139,62,16,.3); }
  .info-tab-content{ padding:6px 22px 26px; overflow-y:auto; background:#fff; border-radius:18px 18px 0 0; }
  .info-tab-content .soon{ text-align:center; color:#bbb; padding:36px 0; font-size:14px; }
  .f-label{
    display:flex; align-items:center; gap:6px; font-size:12px; color:var(--trunk-ring); font-weight:700;
    margin:18px 0 6px; letter-spacing:.2px;
  }
  .f-label::before{ content:""; width:5px; height:5px; border-radius:50%; background:var(--gold); flex:none; }
  .f-input{
    width:100%; box-sizing:border-box; padding:11px 14px; border:1.3px solid #E6E1D5; border-radius:11px;
    font-family:'Tajawal',sans-serif; font-size:14px; text-align:right; outline:none; background:#FBFAF6;
    transition:border-color .15s, box-shadow .15s;

// ============ Firebase: التهيئة والدخول ============
const firebaseConfig = {

  projectId: "asmalfamilytree",

  messagingSenderId: "233022414794",
  appId: "1:233022414794:web:0351d346d72b817b1cb933",
  measurementId: "G-5W6N75Q1PS"
};
firebase.initializeApp(firebaseConfig);
const secondaryApp = firebase.initializeApp(firebaseConfig, "Secondary");
const auth = firebase.auth();
const db = firebase.firestore();

const ADMIN_USERNAME = "محمد رشاد";
const ADMIN_BOOTSTRAP_PASSWORD = "05041061532832";

let currentUser = null;      // { uid, role, scopePersonId, displayName }
window.currentUser = null;   // متاح عالميًا لباقي الكود

function usernameToEmail(username){
  const clean = username.trim().toLowerCase()
    .replace(/[\u064B-\u0652]/g, "")   // إزالة التشكيل لو وجد
    .replace(/\s+/g, ".")
    .replace(/[^a-z0-9.\u0600-\u06FF]/g, "");
  return clean + "@asmal-family-tree.app";
}

function showAuthError(msg){
  document.getElementById("authError").textContent = msg;
}
function setAuthLoading(on){
  document.getElementById("authLoading").style.display = on ? "block" : "none";
  document.getElementById("authLoginBtn").disabled = on;
}

async function ensureUserDoc(uid, defaults){
  const ref = db.collection("users").doc(uid);
  const snap = await ref.get();
  if (!snap.exists){
    await ref.set(defaults);
    return defaults;
  }
  return snap.data();
}

function withTimeout(promise, ms, label){
  return Promise.race([
    promise,
    new Promise((_, reject) => setTimeout(() => reject({ code: "timeout", message: label }), ms))
  ]);
}

document.getElementById("authLoginBtn").onclick = async function(){
  const username = document.getElementById("authUsername").value.trim();
  const password = document.getElementById("authPassword").value;
  showAuthError("");
  if (!username || !password){ showAuthError("أدخل اسم المستخدم وكلمة المرور"); return; }
  setAuthLoading(true);
  const email = usernameToEmail(username);
  try{
    const cred = await withTimeout(auth.signInWithEmailAndPassword(email, password), 12000,
      "تعذّر الاتصال بالخادم. جرّب فتح الملف من متصفح Chrome مباشرة (مو معاينة ملفات التنزيلات)، وتأكد من اتصال الإنترنت.");
  }catch(err){
    if (err.code === "timeout"){ setAuthLoading(false); showAuthError(err.message); return; }
    if ((err.code === "auth/user-not-found" || err.code === "auth/invalid-credential" || err.code === "auth/invalid-login-credentials")
        && username === ADMIN_USERNAME && password === ADMIN_BOOTSTRAP_PASSWORD){
      try{
        window.__adminBootstrapping = true;
        const cred = await withTimeout(auth.createUserWithEmailAndPassword(email, password), 12000,
          "تعذّر الاتصال بالخادم. جرّب فتح الملف من متصفح Chrome مباشرة، وتأكد من اتصال الإنترنت.");
        await db.collection("users").doc(cred.user.uid).set({
          role: "admin", displayName: ADMIN_USERNAME, scopePersonId: null, createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        window.__adminBootstrapping = false;
        await afterSignIn(cred.user);
      }catch(err2){
        window.__adminBootstrapping = false;
        setAuthLoading(false);
        showAuthError(err2.code === "timeout" ? err2.message : ("تعذّر إنشاء حساب المشرف: " + (err2.message || err2.code)));
      }
      return;
    }
    setAuthLoading(false);
    if (err.code === "auth/wrong-password" || err.code === "auth/invalid-credential" || err.code === "auth/invalid-login-credentials"){
      showAuthError("كلمة المرور غير صحيحة");
    } else if (err.code === "auth/user-not-found"){
      showAuthError("هذا المستخدم غير موجود. تواصل مع محمد رشاد لإضافتك");
    } else {
      showAuthError("خطأ: " + (err.message || err.code));
    }
  }
};

document.getElementById("authPassword").addEventListener("keydown", (e) => {
  if (e.key === "Enter") document.getElementById("authLoginBtn").click();
});

async function afterSignIn(fbUser){
  if (window.__adminBootstrapping) return;
  const userDoc = await ensureUserDoc(fbUser.uid, {
    role: "limited", displayName: (fbUser.email || "").split("@")[0], scopePersonId: null,
    canView: true, createdAt: firebase.firestore.FieldValue.serverTimestamp()
  });
  currentUser = { uid: fbUser.uid, role: userDoc.role, scopePersonId: userDoc.scopePersonId || null,
    scopePersonName: userDoc.scopePersonName || null, displayName: userDoc.displayName,
    canView: userDoc.canView !== false };
  window.currentUser = currentUser;
  document.getElementById("authOverlay").classList.add("hidden");
  setAuthLoading(false);
  document.getElementById("currentUserName").textContent = "👤 " + currentUser.displayName;
  document.getElementById("currentUserBadge").classList.add("show");
  document.getElementById("noViewMsg").classList.remove("show");
  document.getElementById("tree-wrap").classList.remove("tree-hidden");
  applyRolePermissions();
}

document.getElementById("logoutBtn").onclick = () => {
  auth.signOut();
  document.getElementById("currentUserBadge").classList.remove("show");
};

auth.onAuthStateChanged((fbUser) => {
  if (fbUser){
    afterSignIn(fbUser);
  } else {
    currentUser = null;
    window.currentUser = null;
    document.getElementById("authOverlay").classList.remove("hidden");
  }
});

function isDbBacked(){ return currentUser && !!treeData.id; }
function canAddUnder(parentDataNode){
  if (!currentUser) return false;
  if (currentUser.role === "admin") return true;
  if (!currentUser.scopePersonId) return false;
  const ids = parentDataNode.ancestorIds || [];
  return parentDataNode.id === currentUser.scopePersonId || ids.includes(currentUser.scopePersonId);
}

async function firestoreAddPerson(parentDataNode, name, type){
  const parentId = parentDataNode.id || null;
  const parentAncestorIds = parentDataNode.ancestorIds || [];
  const ref = db.collection("persons").doc();
  const ancestorIds = parentAncestorIds.concat([ref.id]);
  const pending = currentUser.role !== "admin";
  await ref.set({
    name, type, parentId: parentId,
    ancestorIds, isJoinPoint: false, pendingApproval: pending,
    addedBy: currentUser.uid, createdAt: firebase.firestore.FieldValue.serverTimestamp()
  });
  return { id: ref.id, ancestorIds, pending };
}

async function firestoreDeletePerson(dataNode){
  const ids = [];
  function collect(n){ if (n.id) ids.push(n.id); (n.children || []).forEach(collect); }
  collect(dataNode);
  const BATCH_SIZE = 400;
  for (let i = 0; i < ids.length; i += BATCH_SIZE){
    const batch = db.batch();
    ids.slice(i, i + BATCH_SIZE).forEach(id => batch.delete(db.collection("persons").doc(id)));
    await batch.commit();
  }
}

function applyRolePermissions(){
  if (!currentUser) return;
  document.body.classList.toggle("role-limited", currentUser.role !== "admin");
  if (currentUser.role === "admin"){
    document.getElementById("migrateRow").style.display = "flex";
    document.getElementById("usersToggle").style.display = "";
    document.getElementById("ioToggle").style.display = "";
    document.getElementById("toggleTree").style.display = "";
    document.getElementById("bgToggle").style.display = "";
  } else {
    document.getElementById("usersToggle").style.display = "none";
    document.getElementById("bgToggle").style.display = "none";
    document.getElementById("ioToggle").style.display = "none";
    document.getElementById("toggleTree").style.display = "none";
    if (currentUser.canView === false){
      document.getElementById("tree-wrap").classList.add("tree-hidden");
      document.getElementById("noViewMsg").classList.add("show");
      return;
    }
  }
  checkMigrationStatusAndLoad();
}

// ============ نقل بيانات الشجرة إلى Firestore (مرة واحدة) ============
async function checkMigrationStatusAndLoad(){
  try{
    const metaSnap = await db.collection("meta").doc("migration").get();
    if (metaSnap.exists && metaSnap.data().done){
      document.getElementById("migrateStatus").textContent = `✅ البيانات منقولة (${metaSnap.data().count || ""} شخص). جارِ التحميل من القاعدة…`;
      await loadTreeFromFirestore();
    } else {
      document.getElementById("migrateStatus").textContent = currentUser.role === "admin"
        ? "⚠️ البيانات لسا محلية (مو منقولة لقاعدة البيانات بعد)"
        : "";
    }
  }catch(e){
    document.getElementById("migrateStatus").textContent = "تعذّر التحقق من حالة قاعدة البيانات: " + (e.message || e.code);
  }
}

document.getElementById("migrateBtn").onclick = async function(){
  if (!currentUser || currentUser.role !== "admin") return;
  const btn = this;
  const statusEl = document.getElementById("migrateStatus");
  const confirmed = window.confirm("سيتم نقل كل بيانات الشجرة الحالية (٦٠٠ شخص تقريبًا) إلى قاعدة البيانات. قد يستغرق دقيقة. هل تريد المتابعة؟");
  if (!confirmed) return;
  btn.disabled = true;
  statusEl.textContent = "جارِ تجهيز البيانات…";
  try{
    // ترقيم كل شخص برقم فريد ثابت (تسلسل ما قبل النظام Pre-order)
    let counter = 0;
    const records = [];
    function walk(node, parentId, ancestorIds){
      counter++;
      const id = "p" + counter;
      const myAncestorIds = ancestorIds.concat([id]);
      records.push({
        id, name: node.name, type: node.type || "leaf",
        parentId: parentId,
        ancestorIds: myAncestorIds,
        isJoinPoint: !!node.isJoinPoint
      });
      (node.children || []).forEach(ch => walk(ch, id, myAncestorIds));
    }
    walk(treeData, null, []);

    statusEl.textContent = `جارِ رفع ${records.length} شخص لقاعدة البيانات…`;

    // الكتابة بدفعات (حد Firestore الأقصى 500 عملية لكل دفعة)
    const BATCH_SIZE = 400;
    for (let i = 0; i < records.length; i += BATCH_SIZE){
      const batch = db.batch();
      const slice = records.slice(i, i + BATCH_SIZE);
      slice.forEach(rec => {
        const ref = db.collection("persons").doc(rec.id);
        batch.set(ref, {
          name: rec.name, type: rec.type, parentId: rec.parentId,
          ancestorIds: rec.ancestorIds, isJoinPoint: rec.isJoinPoint,
          pendingApproval: false, addedBy: currentUser.uid,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
      });
      await batch.commit();
      statusEl.textContent = `تم رفع ${Math.min(i + BATCH_SIZE, records.length)} من ${records.length}…`;
    }

    await db.collection("meta").doc("migration").set({
      done: true, count: records.length, migratedAt: firebase.firestore.FieldValue.serverTimestamp(), migratedBy: currentUser.uid
    });

    statusEl.textContent = `✅ تم نقل ${records.length} شخص بنجاح! جارِ إعادة التحميل من القاعدة…`;
    document.getElementById("migrateRow").style.display = "none";
    await loadTreeFromFirestore();
  }catch(e){
    statusEl.textContent = "❌ خطأ أثناء النقل: " + (e.message || e.code);
    btn.disabled = false;
  }
};

async function loadTreeFromFirestore(){
  const snap = await db.collection("persons").get();
  if (snap.empty) return;
  const isAdminView = currentUser && currentUser.role === "admin";
  const byId = new Map();
  snap.forEach(doc => {
    const d = doc.data();
    if (!isAdminView && d.pendingApproval) return; // إخفاء الإضافات المعلّقة عن غير المشرف
    byId.set(doc.id, { id: doc.id, name: d.name, type: d.type, isJoinPoint: d.isJoinPoint, parentId: d.parentId, ancestorIds: d.ancestorIds || [], pendingApproval: !!d.pendingApproval, children: [] });
  });
  let rootNode = null;
  byId.forEach((node, id) => {
    if (node.parentId && byId.has(node.parentId)){
      byId.get(node.parentId).children.push(node);
    } else if (!node.parentId){
      rootNode = node;
    }
  });
  if (!rootNode) return;

  // للمستخدم المحدود: نعرض بس من نقطته (شخصه) نزولًا لأبنائه وأحفاده
  if (!isAdminView && currentUser && currentUser.scopePersonId){
    const scopeNode = byId.get(currentUser.scopePersonId);
    if (scopeNode) rootNode = scopeNode;
  }

  function clean(n){
    const out = { name: n.name, type: n.type, id: n.id, ancestorIds: n.ancestorIds };
    if (n.isJoinPoint) out.isJoinPoint = true;
    if (n.pendingApproval) out.pendingApproval = true;
    if (n.children.length) out.children = n.children.map(clean);
    return out;
  }
  const cleaned = clean(rootNode);
  treeData.name = cleaned.name;
  treeData.type = cleaned.type;
  treeData.id = cleaned.id;
  treeData.ancestorIds = cleaned.ancestorIds;
  treeData.children = cleaned.children || [];
  refreshView();
  document.getElementById("migrateStatus").textContent = "✅ البيانات محمّلة من قاعدة البيانات مباشرة";
}

const newUserScopeInput = document.getElementById("newUserScopeInput");
const newUserScopeDropdown = document.getElementById("newUserScopeDropdown");
newUserScopeInput.addEventListener("input", () => {
  selectedScopePerson = null;
  const q = newUserScopeInput.value.trim();
  newUserScopeDropdown.innerHTML = "";
  if (!q){ newUserScopeDropdown.classList.remove("show"); return; }
  const parts = q.split(/\s+/).filter(Boolean);
  let matches;
  if (parts.length > 1){
    matches = root.descendants().filter(d => {
      const chain = chainNames(d);
      if (chain.length < parts.length) return false;
      for (let i = 0; i < parts.length; i++) if (!chain[i].includes(parts[i])) return false;
      return true;
    });
  } else {
    matches = root.descendants().filter(d => d.data.name.includes(q));
  }
  matches = matches.slice(0, 30);
  if (!matches.length){ newUserScopeDropdown.classList.remove("show"); return; }
  matches.forEach(m => {
    const item = document.createElement("div");
    item.className = "autocomplete-item";
    item.innerHTML = `${m.data.name}<span class="chain-sub">${chainNames(m).join(" بن ")}</span>`;
    item.onclick = () => {
      selectedScopePerson = { id: m.data.id, name: m.data.name, ancestorIds: m.data.ancestorIds || [] };
      newUserScopeInput.value = chainNames(m).slice(0, 3).join(" ");
      newUserScopeDropdown.classList.remove("show");
    };
    newUserScopeDropdown.appendChild(item);
  });
  newUserScopeDropdown.classList.add("show");
});

document.getElementById("newUserAddBtn").onclick = async function(){
  const username = document.getElementById("newUserName").value.trim();

  const statusEl = document.getElementById("newUserStatus");
  if (!username || !password){ statusEl.textContent = "أدخل اسم المستخدم وكلمة المرور"; return; }

  try{

    await db.collection("users").doc(cred.user.uid).set({
      role: "limited", displayName: username, scopePersonId: selectedScopePerson.id,
      scopePersonName: selectedScopePerson.name,

async function refreshUsersAndPendingLists(){
  if (!currentUser || currentUser.role !== "admin") return;
  const usersListEl = document.getElementById("usersList");
  const pendingListEl = document.getElementById("pendingList");
  usersListEl.innerHTML = "جارِ التحميل…";
  pendingListEl.innerHTML = "جارِ التحميل…";

  // خريطة uid -> اسم المستخدم (تُستخدم لعرض "أضافه فلان" بقائمة الاعتماد)
  const uidToName = new Map();
  uidToName.set(currentUser.uid, currentUser.displayName);

  try{
    const usersSnap = await db.collection("users").where("role", "==", "limited").get();
    usersSnap.forEach(doc => uidToName.set(doc.id, doc.data().displayName));
    if (usersSnap.empty){
      usersListEl.innerHTML = `<span style="color:#999;font-size:13px">لا يوجد مستخدمون محدودون بعد</span>`;
    } else {
      usersListEl.innerHTML = "";
      usersSnap.forEach(doc => {
        const u = doc.data();
        const canView = u.canView !== false;
        const row = document.createElement("div");
        row.className = "chip";
        row.style.cssText = "display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; width:100%; box-sizing:border-box;";
        row.innerHTML = `<span>${u.displayName} — نطاقه: ${u.scopePersonName || "؟"}</span>
          <span style="display:flex; gap:8px; align-items:center;">
            <span class="view-toggle" style="cursor:pointer; font-size:12px; padding:3px 8px; border-radius:10px; background:${canView ? "#E4F3EA" : "#FCE4E4"}; color:${canView ? "#1E7A4C" : "#8B1E1E"};">${canView ? "👁️ يشاهد" : "🚫 ممنوع"}</span>
            <span class="chip-x" title="حذف">✕</span>
          </span>`;
        row.querySelector(".view-toggle").onclick = async () => {
          await db.collection("users").doc(doc.id).update({ canView: !canView });
          refreshUsersAndPendingLists();
        };
        row.querySelector(".chip-x").onclick = async () => {
          if (!confirm(`حذف المستخدم "${u.displayName}"؟ (هذا يمنعه من الدخول، ولا يحذف إضافاته السابقة)`)) return;
          await db.collection("users").doc(doc.id).delete();
          refreshUsersAndPendingLists();
        };
        usersListEl.appendChild(row);
      });
    }
  }catch(e){
    usersListEl.innerHTML = "تعذّر التحميل: " + (e.message || e.code);
  }

  try{
    const pendingSnap = await db.collection("persons").where("pendingApproval", "==", true).get();
    if (pendingSnap.empty){
      pendingListEl.innerHTML = `<span style="color:#999;font-size:13px">لا يوجد إضافات بانتظار الاعتماد</span>`;
    } else {
      pendingListEl.innerHTML = "";
      for (const doc of pendingSnap.docs){
        const p = doc.data();
        let parentName = "؟";
        if (p.parentId){
          try{
            const parentSnap = await db.collection("persons").doc(p.parentId).get();
            if (parentSnap.exists) parentName = parentSnap.data().name;
          }catch(e){}
        }
        const adderName = uidToName.get(p.addedBy) || "غير معروف";
        const row = document.createElement("div");
        row.style.cssText = "display:flex; flex-direction:column; gap:6px; margin-bottom:8px; padding:8px; background:#FFF8E1; border-radius:8px; cursor:pointer;";
        row.innerHTML = `
          <div><b>${p.name}</b> — ابن لـ <b>${parentName}</b></div>
          <div style="font-size:12px; color:#777;">أضافه: ${adderName} — اضغط لعرض موقعه بالخريطة 📍</div>
          <div><button class="f-btn-sm approve-btn" style="margin-left:6px;">✅ اعتماد</button><button class="f-btn-sm reject-btn" style="background:#8B1E1E;">✕ رفض</button></div>
        `;
        row.onclick = () => jumpToPerson(doc.id);
        row.querySelector(".approve-btn").onclick = async (event) => {
          event.stopPropagation();
          await db.collection("persons").doc(doc.id).update({ pendingApproval: false });
          refreshUsersAndPendingLists();
          await loadTreeFromFirestore();
        };
        row.querySelector(".reject-btn").onclick = async (event) => {
          event.stopPropagation();
          if (!confirm(`رفض وحذف "${p.name}"؟`)) return;
          await db.collection("persons").doc(doc.id).delete();
          refreshUsersAndPendingLists();
        };
        pendingListEl.appendChild(row);
      }
    }
  }catch(e){
    pendingListEl.innerHTML = "تعذّر التحميل: " + (e.message || e.code);
  }
}

try{
  const savedTree = localStorage.getItem("tree-data-edits");
  if (savedTree){
    const parsed = JSON.parse(savedTree);
    treeData.children = parsed.children;
  }
}catch(e){}

let root = d3.hierarchy(treeData);
const dx = 100, dy = 175;
d3.tree().nodeSize([dx, dy])(root);

let x0 = Infinity, x1 = -Infinity;
root.each(d => { if (d.x > x1) x1 = d.x; if (d.x < x0) x0 = d.x; });
let width = x1 - x0 + 180;
let height = (root.height + 1) * dy + 160;

const svg = d3.select("#tree-svg");
const containerW = svg.node().clientWidth || 1000;
const containerH = svg.node().clientHeight || 700;
svg.attr("viewBox", [0, 0, containerW, containerH]);
const g = svg.append("g");
const zoom = d3.zoom().scaleExtent([0.35, 4]).filter((e) => !manualMode || e.type === "wheel").on("zoom", (e) => g.attr("transform", e.transform));
svg.call(zoom);
const initScale = 0.68;

let layoutOverrides = new Map(); // personId -> {x,y} مواقع مخصّصة يدويًا (وضع التحريك اليدوي فقط)

function sx(d){ return d.x - x0 + 90; }
function sy(d){
  const ov = layoutOverrides.get(personId(d));
  if (ov) return ov.y;
  return height - 70 - d.depth * dy;
} // الجد الأول بالأسفل

function centerOnRoot(){
  const w = svg.node().clientWidth, h = svg.node().clientHeight;
  return d3.zoomIdentity
    .translate(w/2 - sx(root)*initScale, h*0.72 - sy(root)*initScale)
    .scale(initScale);
}

function jumpToPerson(personId){
  document.getElementById("usersPanel").classList.remove("show");
  document.getElementById("tree-wrap").classList.remove("tree-hidden");
  exitFocusMode();
  const d = root.descendants().find(n => n.data.id === personId);
  if (!d){ alert("تعذّر إيجاد الشخص بالشجرة الحالية."); return; }
  const w = svg.node().clientWidth, h = svg.node().clientHeight;
  const targetScale = 1;
  const t = d3.zoomIdentity.translate(w/2 - sx(d)*targetScale, h/2 - sy(d)*targetScale).scale(targetScale);
  svg.transition().duration(600).call(zoom.transform, t);
  node.select(".ring").classed("show", n => n === d);
  setTimeout(() => { node.select(".ring").classed("show", false); }, 3000);
}

async function approvePendingPerson(d){
  if (!confirm(`اعتماد "${d.data.name}"؟`)) return;
  try{
    await db.collection("persons").doc(d.data.id).update({ pendingApproval: false });
    await loadTreeFromFirestore();
    refreshUsersAndPendingLists();
  }catch(e){ alert("تعذّر الاعتماد: " + (e.message || e.code)); }
}

async function rejectPendingPerson(d){
  if (!confirm(`رفض وحذف "${d.data.name}"؟`)) return;
  try{
    await db.collection("persons").doc(d.data.id).delete();
    await loadTreeFromFirestore();
    refreshUsersAndPendingLists();
  }catch(e){ alert("تعذّر الرفض: " + (e.message || e.code)); }
}

const R = { root:26, trunk:21, leaf:17, joinpoint:30, "trunk-red":21, "trunk-green":21, "trunk-blue":21, "trunk-gold":21, "female":15 };
let busYByParent, node;

let manualMode = false;
function saveLayoutOverrides(){
  try{ localStorage.setItem("layout-overrides-v2", JSON.stringify([...layoutOverrides.entries()])); }
  catch(e){ console.error("تعذر حفظ الترتيب اليدوي", e); }
}

const dragBehavior = d3.drag()
  .filter(() => manualMode)
  .on("start", function(event){ event.sourceEvent.stopPropagation(); d3.select(this).raise(); })
  .on("drag", function(event, d){
    const key = personId(d);
    const cur = layoutOverrides.get(key) || { x: sx(d), y: sy(d) };
    const next = { x: cur.x + event.dx, y: cur.y + event.dy };
    layoutOverrides.set(key, next);
    d3.select(this).attr("transform", `translate(${next.x},${next.y})`);
  })
  .on("end", function(){
    saveLayoutOverrides();
    buildAndRender();
  });

function buildAndRender(){
  root = d3.hierarchy(treeData);
  d3.tree().nodeSize([dx, dy])(root);
  x0 = Infinity; x1 = -Infinity;
  root.each(d => { if (d.x > x1) x1 = d.x; if (d.x < x0) x0 = d.x; });
  width = x1 - x0 + 180;
  height = (root.height + 1) * dy + 160;

  g.selectAll("*").remove();

  // روابط بخطوط قائمة الزوايا (مثل مخططات النسب التقليدية) — كل رابط عنصر مستقل مربوط ببياناته
  busYByParent = new Map();
  root.links().forEach(l => {
    if (!busYByParent.has(l.source)) {
      busYByParent.set(l.source, (sy(l.source) + sy(l.target)) / 2);
    }
  });

  g.selectAll("path.link")
    .data(root.links())
    .join("path")
    .attr("class", l => "link" + (l.target.data.type === "female" ? " to-female" : ""))
    .attr("d", l => {
      const px_ = sx(l.source), py = sy(l.source);
      const cx = sx(l.target), cy = sy(l.target);
      const busY = busYByParent.get(l.source);
      return `M${px_},${py} L${px_},${busY} L${cx},${busY} L${cx},${cy}`;
    });

  node = g.selectAll("g.node")
    .data(root.descendants())
    .join("g")
    .attr("class", d => "node " + d.data.type)
    .attr("transform", d => `translate(${sx(d)},${sy(d)})`)
    .on("click", (event, d) => showInfo(d))
    .on("dblclick", (event, d) => {
      if (!manualMode) return;
      event.stopPropagation();
      layoutOverrides.delete(personId(d));
      saveLayoutOverrides();
      buildAndRender();
    })
    .call(dragBehavior);

  node.append("circle").attr("class","hit").attr("r", 26);

  node.append("circle")
    .attr("class", d => "avatar-" + d.data.type)
    .attr("r", d => R[d.data.type]);

  node.append("circle")
    .attr("class","ring")
    .attr("r", d => R[d.data.type] + 6);

  // أيقونة شخص بسيطة داخل كل دائرة
  node.each(function(d){
    const r = R[d.data.type];
    const s = d3.select(this);
    s.append("circle").attr("class","glyph").attr("cy", -r*0.28).attr("r", r*0.26);
    s.append("path").attr("class","glyph")
      .attr("d", `M ${-r*0.42},${r*0.5} Q ${-r*0.42},${r*0.02} 0,${r*0.02} Q ${r*0.42},${r*0.02} ${r*0.42},${r*0.5} Z`);
  });

  // ثلاث خطوط حمراء فوق كل شخص "بانتظار الاعتماد" (تظهر لمحمد رشاد فقط)
  node.filter(d => d.data.pendingApproval).each(function(d){
    const r = R[d.data.type];
    const s = d3.select(this);
    const g2 = s.append("g").attr("class","pending-mark");
    [-r*0.55, 0, r*0.55].forEach(offsetY => {
      g2.append("line")
        .attr("x1", -r*0.85).attr("x2", r*0.85)
        .attr("y1", offsetY).attr("y2", offsetY)
        .attr("stroke", "#D6262A").attr("stroke-width", 2.4).attr("stroke-linecap", "round");
    });
  });

  // اعتماد ✅ / رفض ✕ مباشرة من الخريطة لكل شخص بانتظار الاعتماد
  node.filter(d => d.data.pendingApproval).each(function(d){
    const r = R[d.data.type];
    const s = d3.select(this);
    const approveBadge = s.append("g").attr("class","approve-badge")
      .attr("transform", `translate(${r*0.68},${-r*0.68})`)
      .on("click", (event) => { event.stopPropagation(); approvePendingPerson(d); });
    approveBadge.append("circle").attr("r", 10);
    approveBadge.append("text").attr("y", 0.5).text("✓");

    const rejectBadge = s.append("g").attr("class","reject-badge")
      .attr("transform", `translate(${-r*0.68},${-r*0.68})`)
      .on("click", (event) => { event.stopPropagation(); rejectPendingPerson(d); });
    rejectBadge.append("circle").attr("r", 10);
    rejectBadge.append("text").attr("y", 0.5).text("✕");
  });

  // علامة + لفتح نافذة المعلومات
  node.filter(d => !d.data.pendingApproval).each(function(d){
    const r = R[d.data.type];
    const s = d3.select(this);
    const badge = s.append("g").attr("class","plus-badge")
      .attr("transform", `translate(${r*0.68},${-r*0.68})`)
      .on("click", (event) => { event.stopPropagation(); openInfoModal(d); });
    badge.append("circle").attr("r", 10);
    badge.append("text").attr("y", 0.5).text("+");
  });

  // علامة - للحذف (مع تأكيد)
  node.filter(d => !d.data.pendingApproval).each(function(d){
    const r = R[d.data.type];
    const s = d3.select(this);
    const badge = s.append("g").attr("class","minus-badge")
      .attr("transform", `translate(${-r*0.68},${-r*0.68})`)
      .on("click", (event) => { event.stopPropagation(); confirmDeletePerson(d); });
    badge.append("circle").attr("r", 10);
    badge.append("text").attr("y", 0.5).text("−");
  });

  // نجمة بدل +/- لصاحب "شجرتي" أثناء التركيز عليه
  node.each(function(d){
    const r = R[d.data.type];
    const s = d3.select(this);
    const badge = s.append("g").attr("class","star-badge")
      .attr("transform", `translate(${r*0.68},${-r*0.68})`);
    badge.append("circle").attr("r", 10);
    badge.append("text").attr("y", 0.5).text("★");
  });

  // بطاقة الاسم أسفل كل أيقونة
  node.each(function(d){
    const r = R[d.data.type];
    const s = d3.select(this);
    const w = Math.max(56, d.data.name.length * 11 + 16);
    const h = 26;
    const yOff = r + 8;
    s.append("rect").attr("class","tag")
      .attr("x", -w/2).attr("y", yOff).attr("width", w).attr("height", h).attr("rx", 6);
    s.append("text").attr("class","tag-text")
      .attr("y", yOff + h/2).text(d.data.name);
    const branchTextColor = { "trunk-red":"#8B1E1E", "trunk-green":"#1E7A4C", "trunk-blue":"#1E7A9C", "trunk-gold":"#B8860B" };
    if (branchTextColor[d.data.type]) s.select(".tag-text").attr("fill", branchTextColor[d.data.type]);
  });
}

function chainNames(d){
  const out = [];
  let a = d;
  while(a){ out.push(a.data.name); a = a.parent; }
  return out;
}

function modalTitleChain(d){
  const out = [];
  let a = d;
  while(a){
    out.push(a.data.name);
    if (a.data.isJoinPoint){
      if (a.parent) out.push(a.parent.data.name);
      break;
    }
    a = a.parent;
  }
  return out;
}

const searchInput = document.getElementById("search");
const searchDropdown = document.getElementById("searchDropdown");
let currentMatches = [];

function runSearch(){
  const q = searchInput.value.trim();
  if (!q){
    exitFocusMode();
    node.select(".ring").classed("show", false);
    currentMatches = [];
    searchDropdown.classList.remove("show"); searchDropdown.innerHTML = "";
    return;
  }
  const parts = q.split(/\s+/).filter(Boolean);
  let matches;
  if (parts.length > 1){
    // بحث بسلسلة نسب: "مهدي محمد أحمد" = مهدي بن محمد بن أحمد
    matches = root.descendants().filter(d => {
      const chain = chainNames(d);
      if (chain.length < parts.length) return false;
      for (let i = 0; i < parts.length; i++){
        if (!chain[i].includes(parts[i])) return false;
      }
      return true;
    });
  } else {
    matches = root.descendants().filter(d => d.data.name.includes(q));
  }
  currentMatches = matches;

  searchDropdown.innerHTML = "";
  if (matches.length){
    matches.slice(0, 10).forEach(m => {
      const item = document.createElement("div");
      item.className = "autocomplete-item";
      item.innerHTML = `${m.data.name}<span class="chain-sub">${chainNames(m).join(" بن ")}</span>`;
      item.onclick = () => {
        searchDropdown.classList.remove("show"); searchDropdown.innerHTML = "";
        showInfo(m);
      };
      searchDropdown.appendChild(item);
    });
    searchDropdown.classList.add("show");
  } else {
    searchDropdown.classList.remove("show");
    exitFocusMode();
    node.select(".ring").classed("show", false);
    return;
  }

  const matchSet = new Set();
  const linkTargetSet = new Set();
  matches.forEach(m => {
    let a = m;
    while (a){
      matchSet.add(a);
      if (a.parent) linkTargetSet.add(a);
      a = a.parent;
    }
  });
  enterFocusMode(matchSet, linkTargetSet);
  node.select(".ring").classed("show", d => matches.includes(d));
}

searchInput.addEventListener("input", runSearch);
searchInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && currentMatches.length){
    showInfo(currentMatches[0]);
    searchInput.blur();
    searchDropdown.classList.remove("show");
  }
});

function findPerson(query){
  const parts = query.trim().split(/\s+/).filter(Boolean);
  if (!parts.length) return null;
  if (parts.length === 1){
    return root.descendants().find(d => d.data.name === parts[0])
        || root.descendants().find(d => d.data.name.includes(parts[0]));
  }
  const exact = root.descendants().find(d => {
    const chain = chainNames(d);
    if (chain.length < parts.length) return false;
    for (let i = 0; i < parts.length; i++) if (chain[i] !== parts[i]) return false;
    return true;
  });
  if (exact) return exact;
  return root.descendants().find(d => {
    const chain = chainNames(d);
    if (chain.length < parts.length) return false;
    for (let i = 0; i < parts.length; i++) if (!chain[i].includes(parts[i])) return false;
    return true;
  });
}

function ancestorsUp(d){ const arr = []; let a = d; while(a){ arr.push(a); a = a.parent; } return arr; } // من الشخص صاعداً للجذر

let joinPointNode = null;
function getJoinPointNode(){
  if (!joinPointNode) joinPointNode = root.descendants().find(d => d.data.isJoinPoint);
  return joinPointNode;
}
function isDescendantOfJoinPoint(d){
  const jp = getJoinPointNode();
  if (!jp) return true;
  let a = d.parent;
  while (a){
    if (a === jp) return true;
    a = a.parent;
  }
  return false;
}

function relationWord(gRef, depth){
  if (gRef === 0){
    return { word: depth === 1 ? "أب" : "جد", literal: true };
  }
  const diff = depth - gRef;
  const minLevel = Math.min(depth, gRef);
  if (diff === 0) return minLevel === 1 ? { word: "أخ", literal: true } : { word: "ابن عم", literal: false };
  if (diff === 1) return { word: "عم", literal: minLevel === 1 };
  if (diff === -1) return { word: "ابن أخ", literal: minLevel === 1 };
  if (diff >= 2) return { word: "جد", literal: true };
  return { word: "حفيد", literal: true };
}

function buildReport(a, b){
  if (a === b) return { same: true };
  const upA = ancestorsUp(a), upB = ancestorsUp(b);
  const mapA = new Map(upA.map((n, i) => [n, i]));
  let lca = null, gA = -1, gB = -1;
  for (let i = 0; i < upB.length; i++){
    if (mapA.has(upB[i])){ lca = upB[i]; gA = mapA.get(upB[i]); gB = i; break; }
  }
  if (!lca) return null;

  const deepIsB = gB >= gA;
  const deepPerson = deepIsB ? b : a, shallowPerson = deepIsB ? a : b;
  const deepUp = deepIsB ? upB : upA, shallowUp = deepIsB ? upA : upB;
  const deepG = Math.max(gA, gB), shallowG = Math.min(gA, gB);
  const diff = deepG - shallowG;

  const deepChain = deepUp.map(n => n.data.name);
  const shallowChain = shallowUp.map(n => n.data.name);

  const lines = [];
  for (let depth = 1; depth <= deepG; depth++){
    const person = deepUp[deepG - depth];
    const rel = relationWord(shallowG, depth);
    lines.push({ name: person.data.name, word: rel.word, literal: rel.literal });
  }

  return {
    lca: lca.data.name, diff, lcaIndex: deepG,
    deepChain, shallowChain,
    refName: shallowPerson.data.name, lines
  };
}

function renderChainGrid(rep){
  const dots = Array.from({ length: rep.diff }, () => "·");
  const rowTop = rep.deepChain;
  const rowBottom = [...dots, ...rep.shallowChain];
  const cell = (txt, i) => {
    const isDot = txt === "·";
    const isLca = i === rep.lcaIndex && !isDot;
    return `<div class="chain-cell ${isDot ? "dot" : ""} ${isLca ? "lca" : ""}">${txt}</div>`;
  };
  const topHtml = rowTop.map((t, i) => cell(t, i)).join("");
  const bottomHtml = rowBottom.map((t, i) => cell(t, i)).join("");
  return `<div class="chain-grid">
    <div class="chain-row top">${topHtml}</div>
    <div class="chain-row bottom">${bottomHtml}</div>
  </div>`;
}

function groupConsecutive(items){
  const groups = [];
  items.forEach(item => {
    const last = groups[groups.length - 1];
    if (last && last.word === item.word && last.literal === item.literal) last.names.push(item.name);
    else groups.push({ word: item.word, literal: item.literal, names: [item.name] });
  });
  return groups;
}

function lineSentence(ref, word, literal, names, isFirst){
  const joined = names.length === 1 ? names[0] : names.join(" وابنه ");
  if (literal){
    if (isFirst && word === "أخ") return `${ref} و${joined} إخوة`;
    return `${isFirst ? "" : "إذن "}${ref} هو ${word} لـ ${joined}`;
  }
  // علاقات بالدرجة (الفارق جيل وليس أخوّة مباشرة بين الآباء)
  if (word === "ابن عم") return `${ref} و${joined} في درجة ابن عم`;
  return `${isFirst ? "" : "إذن "}${ref} في درجة ${word} ${joined}`;
}

function renderSteps(rep){
  const ref = rep.refName;
  const first = rep.lines[0];
  const last = rep.lines[rep.lines.length - 1];
  let html = `<div>${rep.lca} هو أول اسم مشترك</div>`;
  html += `<div>${lineSentence(ref, first.word, first.literal, [first.name], true)}</div>`;

  const middle = rep.lines.slice(1, rep.lines.length - 1);
  const groups = groupConsecutive(middle);
  groups.forEach(g => {
    html += `<div>${lineSentence(ref, g.word, g.literal, g.names, false)}</div>`;
  });

  if (rep.lines.length > 1){
    const finalText = last.literal
      ? `العلاقة النهائية: ${ref} ${last.word} ${last.name}`
      : (last.word === "ابن عم"
          ? `العلاقة النهائية: ${ref} و${last.name} في درجة ابن عم`
          : `العلاقة النهائية: ${ref} في درجة ${last.word} ${last.name}`);
    html += `<div class="final">${finalText}</div>`;
  }
  return `<div class="rel-steps">${html}</div>`;
}

function buildCompactLayout(nodeSet, useFoundingRow){
  const miniMap = new Map();
  nodeSet.forEach(n => miniMap.set(n, { orig: n, children: [] }));
  let miniRoot = null;
  nodeSet.forEach(n => {
    const mini = miniMap.get(n);
    if (n.parent && nodeSet.has(n.parent)) miniMap.get(n.parent).children.push(mini);
    else miniRoot = mini;
  });
  const h = d3.hierarchy(miniRoot, d => d.children.length ? d.children : null);
  const compactDx = 130, compactDy = 115;
  d3.tree().nodeSize([compactDx, compactDy])(h);
  let cx0 = Infinity, cx1 = -Infinity;
  h.each(d => { if (d.x > cx1) cx1 = d.x; if (d.x < cx0) cx0 = d.x; });

  const posMap = new Map();
  h.each(d => {
    posMap.set(d.data.orig, { x: d.x - cx0, y: (h.height - d.depth) * compactDy });
  });

  // سلسلة الجد الأول ← علي: تُعرض كصف أفقي واحد بأسفل الشجرة (جزء منها، يتحرك معها)
  // بدل ما تاخذ مساحة رأسية طويلة (جيل فوق جيل) — بميزة "شجرتي" فقط
  if (useFoundingRow){
    const jp = getJoinPointNode();
    let jpMiniNode = null;
    h.each(d => { if (d.data.orig === jp) jpMiniNode = d; });
    if (jpMiniNode){
      const foundingChain = []; // [Ali-mini, ..., root-mini]
      let a = jpMiniNode;
      while (a){ foundingChain.push(a); a = a.parent; }
      const bottomY = h.height * compactDy;
      const rowSpacing = compactDx;
      const aliPos = posMap.get(jp);
      const anchorX = aliPos.x;
      foundingChain.forEach((mn, i) => {
        posMap.set(mn.data.orig, { x: anchorX + i * rowSpacing, y: bottomY });
      });
    }
  }

  let px0 = Infinity, px1 = -Infinity;
  posMap.forEach(p => { if (p.x < px0) px0 = p.x; if (p.x > px1) px1 = p.x; });
  posMap.forEach(p => { p.x -= px0; });
  return { posMap, width: px1 - px0, height: h.height * compactDy };
}

function enterFocusMode(nodeSet, linkTargetSet, useFoundingRow){
  const { posMap, width: cw, height: ch } = buildCompactLayout(nodeSet, useFoundingRow);
  const svgW = svg.node().clientWidth, svgH = svg.node().clientHeight;
  const fitScale = Math.max(0.35, Math.min(1.15, (svgW - 60) / Math.max(cw, 1), (svgH - 120) / Math.max(ch, 1)));
  const tx = svgW / 2 - fitScale * (cw / 2);
  const ty = svgH / 2 - fitScale * (ch / 2);

  svg.transition().duration(300).call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(fitScale));

  node.classed("path-hidden", d => !nodeSet.has(d));
  node.filter(d => nodeSet.has(d))
    .transition().duration(500)
    .attr("transform", d => { const p = posMap.get(d); return `translate(${p.x},${p.y})`; });

  g.selectAll(".link")
    .classed("path-hidden", d => !linkTargetSet.has(d.target));
  g.selectAll(".link").filter(d => linkTargetSet.has(d.target))
    .classed("path-highlight", true)
    .transition().duration(500)
    .attr("d", d => {
      const ps = posMap.get(d.source), pt = posMap.get(d.target);
      const sxp = ps.x, syp = ps.y, txp = pt.x, typ = pt.y;
      const midY = (syp + typ) / 2;
      return `M${sxp},${syp} L${sxp},${midY} L${txp},${midY} L${txp},${typ}`;
    });

  document.getElementById("exitFocus").classList.add("show");
}

function exitFocusMode(){
  node.classed("path-hidden", false).classed("path-highlight", false).classed("is-focal", false);
  document.getElementById("myTreeInfoPanel").classList.remove("show");
  document.getElementById("artBackground").style.display = "";
  node.transition().duration(400).attr("transform", d => `translate(${sx(d)},${sy(d)})`);
  g.selectAll(".link").classed("path-hidden", false).classed("path-highlight", false)
    .transition().duration(400)
    .attr("d", d => {
      const px_ = sx(d.source), py = sy(d.source), cx = sx(d.target), cy = sy(d.target);
      const busY = busYByParent.get(d.source);
      return `M${px_},${py} L${px_},${busY} L${cx},${busY} L${cx},${cy}`;
    });
  svg.transition().duration(400).call(zoom.transform, centerOnRoot());
  document.getElementById("exitFocus").classList.remove("show");
}

function highlightPath(pa, pb){
  const upA = ancestorsUp(pa), upB = ancestorsUp(pb);
  const mapA = new Map(upA.map((n, i) => [n, i]));
  let lca = null, gA = -1, gB = -1;
  for (let i = 0; i < upB.length; i++){
    if (mapA.has(upB[i])){ lca = upB[i]; gA = mapA.get(upB[i]); gB = i; break; }
  }
  if (!lca) return;

  const nodeSet = new Set();
  const linkTargetSet = new Set();
  for (let i = 0; i <= gA; i++){ nodeSet.add(upA[i]); if (i < gA) linkTargetSet.add(upA[i]); }
  for (let i = 0; i <= gB; i++){ nodeSet.add(upB[i]); if (i < gB) linkTargetSet.add(upB[i]); }
  nodeSet.add(lca);

  enterFocusMode(nodeSet, linkTargetSet);
}

function attachChainAutocomplete(inputEl, dropdownEl){
  inputEl.addEventListener("input", () => {
    const q = inputEl.value.trim();
    if (!q){ dropdownEl.classList.remove("show"); dropdownEl.innerHTML = ""; return; }
    const parts = q.split(/\s+/).filter(Boolean);
    let matches;
    if (parts.length > 1){
      matches = root.descendants().filter(d => {
        const chain = chainNames(d);
        if (chain.length < parts.length) return false;
        for (let i = 0; i < parts.length; i++) if (!chain[i].includes(parts[i])) return false;
        return true;
      });
    } else {
      matches = root.descendants().filter(d => d.data.name.includes(q));
    }
    matches = matches.slice(0, 10);
    dropdownEl.innerHTML = "";
    if (!matches.length){ dropdownEl.classList.remove("show"); return; }
    matches.forEach(m => {
      const item = document.createElement("div");
      item.className = "autocomplete-item";
      item.innerHTML = `${m.data.name}<span class="chain-sub">${chainNames(m).join(" بن ")}</span>`;
      item.onclick = () => {
        inputEl.value = chainNames(m).slice(0, 4).join(" ");
        dropdownEl.classList.remove("show");
        dropdownEl.innerHTML = "";
      };
      dropdownEl.appendChild(item);
    });
    dropdownEl.classList.add("show");
  });
}

async function findMaternalGrandfather(personNode){
  const father = personNode.parent;
  if (!father) return null;
  const fatherData = await loadPersonData(personId(father));
  const wives = fatherData.wives || [];
  for (const w of wives){
    if (w.type === "inside" && w.fatherId && (w.children || []).includes(personNode.data.name)){
      return root.descendants().find(n => personId(n) === w.fatherId) || null;
    }
  }
  return null;
}

async function maternalRelationNote(pa, pb){
  const mgfA = await findMaternalGrandfather(pa);
  const mgfB = await findMaternalGrandfather(pb);
  if (mgfA && pb === mgfA){
    return `${pb.data.name} هو جد ${pa.data.name} من جهة الأم (والد والدة ${pa.data.name})`;
  }
  if (mgfB && pa === mgfB){
    return `${pa.data.name} هو جد ${pb.data.name} من جهة الأم (والد والدة ${pb.data.name})`;
  }
  if (mgfA && pb.parent === mgfA){
    return `${pb.data.name} هو خال ${pa.data.name} (أخو والدة ${pa.data.name})`;
  }
  if (mgfB && pa.parent === mgfB){
    return `${pa.data.name} هو خال ${pb.data.name} (أخو والدة ${pb.data.name})`;
  }
  if (mgfA && mgfB && mgfA === mgfB){
    return `${pa.data.name} و${pb.data.name} أبناء خالة (أمّاهما أختان، بنات ${modalTitleChain(mgfA).join(" ")})`;
  }
  // ملاحظة: نفس الحالة تُقرأ "ابن خال" من جهة B أو "ابن عمة" من جهة A — نعرضها هنا
  // بصيغة "ابن عمة" حسب ترتيب الإدخال (A أولاً) كما طُلب.
  if (mgfA && pb.parent && pb.parent.parent === mgfA){
    return `${pa.data.name} هو ابن عمة ${pb.data.name} (والدة ${pa.data.name} هي عمة ${pb.data.name})`;
  }
  if (mgfB && pa.parent && pa.parent.parent === mgfB){
    return `${pa.data.name} هو ابن خال ${pb.data.name} (والد ${pa.data.name} هو خال ${pb.data.name})`;
  }
  return null;
}

async function fatherInLawNote(pa, pb){
  const dataB = await loadPersonData(personId(pb));
  for (const w of (dataB.wives || [])){
    if (w.type === "inside" && w.fatherId === personId(pa) && !w.divorced){
      return `${pa.data.name} هو والد زوجة ${pb.data.name}`;
    }
  }
  const dataA = await loadPersonData(personId(pa));
  for (const w of (dataA.wives || [])){
    if (w.type === "inside" && w.fatherId === personId(pb) && !w.divorced){
      return `${pb.data.name} هو والد زوجة ${pa.data.name}`;
    }
  }
  return null;
}

async function paternalAuntNote(pa, pb){
  function auntsOf(person){
    const father = person.parent;
    if (!father) return [];
    const grandfather = father.parent;
    if (!grandfather) return [];
    return (grandfather.children || []).filter(c => c.data.type === "female");
  }
  const index = await loadMarriageIndex();
  const auntsA = auntsOf(pa);
  for (const aunt of auntsA){
    const m = index[personId(aunt)];
    if (m && !m.divorced && pb.parent && m.husbandId === personId(pb.parent)){
      return `${pa.data.name} هو ابن عمة ${pb.data.name} (والد ${pb.data.name} تزوّج عمة ${pa.data.name})`;
    }
  }
  const auntsB = auntsOf(pb);
  for (const aunt of auntsB){
    const m = index[personId(aunt)];
    if (m && !m.divorced && pa.parent && m.husbandId === personId(pa.parent)){
      return `${pb.data.name} هو ابن عمة ${pa.data.name} (والد ${pa.data.name} تزوّج عمة ${pb.data.name})`;
    }
  }
  return null;
}

async function extraRelationNotes(pa, pb){
  const notes = [];
  const n1 = await maternalRelationNote(pa, pb); if (n1) notes.push(n1);
  const n2 = await fatherInLawNote(pa, pb); if (n2) notes.push(n2);
  const n3 = await paternalAuntNote(pa, pb); if (n3 && !notes.includes(n3)) notes.push(n3);
  return notes;
}

function toArabicDigits(n){
  const map = ["٠","١","٢","٣","٤","٥","٦","٧","٨","٩"];
  return String(n).split("").map(ch => /[0-9]/.test(ch) ? map[+ch] : ch).join("");

function ensureWifeNode(wi){
  const w = wivesState[wi];
  if (w.type !== "inside" || !w.fatherId) return;
  const fatherNode = root.descendants().find(n => personId(n) === w.fatherId);
  if (!fatherNode) return;
  fatherNode.data.children = fatherNode.data.children || [];
  if (!w._femaleNodeData){
    const existingFemales = fatherNode.data.children.filter(c => c.type === "female").length;
    const autoName = "ابنة" + toArabicDigits(existingFemales + 1);
    const femaleData = { name: w.wifeName || autoName, type: "female", gender: "female" };
    fatherNode.data.children.push(femaleData);
    w._femaleNodeData = femaleData;
  } else if (w.wifeName && w._femaleNodeData.name !== w.wifeName){
    w._femaleNodeData.name = w.wifeName;
  }
  const myDataRef = modalNode.data;
  buildAndRender();
  modalNode = root.descendants().find(n => n.data === myDataRef);
  document.getElementById("f-sonsCount").textContent = modalNode.children ? modalNode.children.filter(c => c.data.type !== "female").length : 0;
}

      divorceLbl.style.cssText = "display:flex;align-items:center;gap:6px;margin-top:10px;font-size:12.5px;color:#a33;cursor:pointer";
      const divorceCb = document.createElement("input");
      divorceCb.type = "checkbox";
      divorceCb.checked = !!w.divorced;
      divorceCb.onchange = () => { wivesState[wi].divorced = divorceCb.checked; };
      divorceLbl.appendChild(divorceCb);
      divorceLbl.append("مطلقة");
      block.appendChild(divorceLbl);
    } else {
      const notaryTitle = document.createElement("label");
      notaryTitle.className = "f-label";
      notaryTitle.textContent = "إدخال العدلاء من القبيلة";
      block.appendChild(notaryTitle);

      const searchBox = makePersonSearchBox("اكتب اسم من القبيلة، ثم اضغط عليه من القائمة", (m) => {
        w.notaries = w.notaries || [];
        const id = personId(m);
        if (!w.notaries.some(x => x.id === id)){
          w.notaries.push({ id, name: m.data.name, chain3: chainNames(m).slice(0,3).join(" بن ") });
        }
        renderWives();
      });
      block.appendChild(searchBox);

      const chipList = document.createElement("div");
      chipList.className = "chip-list";
      (w.notaries || []).forEach((n, ni) => {
        const chip = document.createElement("div");
        chip.className = "chip";
        chip.innerHTML = `<span>${n.chain3 || n.name}</span><span class="chip-x">✕</span>`;
        chip.querySelector(".chip-x").onclick = () => { w.notaries.splice(ni, 1); renderWives(); };
        chipList.appendChild(chip);
      });
      block.appendChild(chipList);
    }

    const childWrap = document.createElement("div");
    childWrap.className = "wife-children";
    const assignedElsewhere = new Set();
    wivesState.forEach((ow, oi) => { if (oi !== wi) ow.children.forEach(c => assignedElsewhere.add(c)); });
    const kids = modalNode.children
      ? modalNode.children.filter(c => c.data.type !== "female").map(c => c.data.name).filter(kName => !assignedElsewhere.has(kName))
      : [];
    if (!kids.length){
      childWrap.innerHTML = `<span style="color:#999">لا يوجد أبناء متاحون للربط بهذه الزوجة</span>`;
    } else {
      kids.forEach(kName => {
        const lbl = document.createElement("label");
        const cb = document.createElement("input");
        cb.type = "checkbox";
        cb.checked = w.children.includes(kName);
        cb.onchange = () => {
          if (cb.checked){ if (!wivesState[wi].children.includes(kName)) wivesState[wi].children.push(kName); }
          else { wivesState[wi].children = wivesState[wi].children.filter(x => x !== kName); }
          renderWives();
        };
        lbl.appendChild(cb);
        lbl.append(kName);
        childWrap.appendChild(lbl);
      });
    }
    block.appendChild(childWrap);

    const rm = document.createElement("div");
    rm.innerHTML = `<span class="chip-x" style="cursor:pointer;font-size:12px">✕ حذف هذه الزوجة</span>`;
    rm.querySelector(".chip-x").onclick = () => { wivesState.splice(wi,1); renderWives(); };
    block.appendChild(rm);

    box.appendChild(block);
  });
}

async function confirmDeletePerson(d){
  const name = d.data.name;
  const childCount = (d.data.children || []).length;
  const warnExtra = childCount ? `\nسيتم حذف ${childCount} من أبنائه وكل ذريتهم أيضًا!` : "";
  const ok = window.confirm(`هل أنت متأكد من حذف "${name}"؟${warnExtra}\nهذا الإجراء لا يمكن التراجع عنه.`);
  if (!ok) return;
  if (!d.parent){
    alert("لا يمكن حذف الجذر الرئيسي للشجرة.");
    return;
  }
  if (isDbBacked() && d.data.id){
    try{ await firestoreDeletePerson(d.data); }
    catch(e){ alert("تعذّر الحذف من قاعدة البيانات: " + (e.message || e.code)); return; }
  }
  const siblingsArr = d.parent.data.children;
  const idx = siblingsArr.indexOf(d.data);
  if (idx !== -1) siblingsArr.splice(idx, 1);
  saveTreeDataEdits();
  if (personalTreeActive === d.data) personalTreeActive = null;
  refreshView();
}

document.getElementById("mtiExportBtn").onclick = async function(){
  if (!personalTreeActive) return;
  const person = root.descendants().find(n => n.data === personalTreeActive);
  if (!person) return;

  const chain = chainNames(person); // [الاسم, الأب, الجد, ...]
  const threePart = chain.slice(0, 3).join(" ");
  const title = `شجرة عائلة ${threePart} حكمي`;
  const exportDate = new Date().toLocaleDateString("ar-SA");

  const svgEl = document.getElementById("tree-svg");
  const treeG = svgEl.querySelector("g");
  const bbox = treeG.getBBox();

  // اختيار اتجاه الورقة A4 حسب شكل الشجرة
  const wide = bbox.width > bbox.height * 1.15;
  const PAGE_W = wide ? 842 : 595;
  const PAGE_H = wide ? 595 : 842;

  const frameMargin = 24;
  const titleH = 64;
  const footerH = 36;
  const contentPad = 24;
  const contentX = frameMargin + contentPad;
  const contentY = frameMargin + titleH + contentPad;
  const contentW = PAGE_W - frameMargin*2 - contentPad*2;
  const contentH = PAGE_H - frameMargin*2 - titleH - footerH - contentPad*2;

  const scale = Math.min(contentW / bbox.width, contentH / bbox.height);
  const offsetX = contentX + (contentW - bbox.width*scale)/2 - bbox.x*scale;
  const offsetY = contentY + (contentH - bbox.height*scale)/2 - bbox.y*scale;

  const svgNS = "http://www.w3.org/2000/svg";
  const page = document.createElementNS(svgNS, "svg");
  page.setAttribute("xmlns", svgNS);
  page.setAttribute("width", PAGE_W);
  page.setAttribute("height", PAGE_H);
  page.setAttribute("viewBox", `0 0 ${PAGE_W} ${PAGE_H}`);

  const styleEl = document.createElementNS(svgNS, "style");
  styleEl.textContent = document.querySelector("style").textContent;
  page.appendChild(styleEl);

  // خلفية بيضاء
  const bg = document.createElementNS(svgNS, "rect");
  bg.setAttribute("x", 0); bg.setAttribute("y", 0);
  bg.setAttribute("width", PAGE_W); bg.setAttribute("height", PAGE_H);
  bg.setAttribute("fill", "#FFFDF6");
  page.appendChild(bg);

  // إطار زخرفي مزدوج
  const outerFrame = document.createElementNS(svgNS, "rect");
  outerFrame.setAttribute("x", frameMargin); outerFrame.setAttribute("y", frameMargin);
  outerFrame.setAttribute("width", PAGE_W - frameMargin*2); outerFrame.setAttribute("height", PAGE_H - frameMargin*2);
  outerFrame.setAttribute("fill", "none");
  outerFrame.setAttribute("stroke", "#B8860B");
  outerFrame.setAttribute("stroke-width", "2.5");
  outerFrame.setAttribute("rx", "10");
  page.appendChild(outerFrame);

  const innerFrame = document.createElementNS(svgNS, "rect");
  innerFrame.setAttribute("x", frameMargin + 6); innerFrame.setAttribute("y", frameMargin + 6);
  innerFrame.setAttribute("width", PAGE_W - (frameMargin+6)*2); innerFrame.setAttribute("height", PAGE_H - (frameMargin+6)*2);
  innerFrame.setAttribute("fill", "none");
  innerFrame.setAttribute("stroke", "#0B3D2E");
  innerFrame.setAttribute("stroke-width", "1");
  innerFrame.setAttribute("rx", "6");
  page.appendChild(innerFrame);

  // خط فاصل تحت العنوان
  const titleLine = document.createElementNS(svgNS, "line");
  titleLine.setAttribute("x1", frameMargin + 30); titleLine.setAttribute("x2", PAGE_W - frameMargin - 30);
  titleLine.setAttribute("y1", frameMargin + titleH - 6); titleLine.setAttribute("y2", frameMargin + titleH - 6);
  titleLine.setAttribute("stroke", "#B8860B"); titleLine.setAttribute("stroke-width", "1.2");
  page.appendChild(titleLine);

  // العنوان في منتصف الورقة أفقيًا
  const titleText = document.createElementNS(svgNS, "text");
  titleText.setAttribute("x", PAGE_W/2);
  titleText.setAttribute("y", frameMargin + titleH/2 + 6);
  titleText.setAttribute("text-anchor", "middle");
  titleText.setAttribute("font-family", "Tajawal, sans-serif");
  titleText.setAttribute("font-size", "24");
  titleText.setAttribute("font-weight", "700");
  titleText.setAttribute("fill", "#241a10");
  titleText.textContent = title;
  page.appendChild(titleText);

  // الشجرة نفسها (منسوخة ومُحجّمة لتناسب المساحة)
  const gClone = treeG.cloneNode(true);
  gClone.querySelectorAll(".plus-badge, .minus-badge, .star-badge").forEach(elm => elm.remove());
  gClone.setAttribute("transform", `translate(${offsetX},${offsetY}) scale(${scale})`);
  page.appendChild(gClone);

  // تاريخ التصدير أسفل الصفحة
  const dateText = document.createElementNS(svgNS, "text");
  dateText.setAttribute("x", PAGE_W - frameMargin - 14);
  dateText.setAttribute("y", PAGE_H - frameMargin - 12);
  dateText.setAttribute("text-anchor", "end");
  dateText.setAttribute("font-family", "Tajawal, sans-serif");
  dateText.setAttribute("font-size", "11");
  dateText.setAttribute("fill", "#777");
  dateText.textContent = "تاريخ التصدير: " + exportDate;
  page.appendChild(dateText);

  const svgText = new XMLSerializer().serializeToString(page);
  const svgBlob = new Blob([svgText], { type: "image/svg+xml;charset=utf-8" });
  const url = URL.createObjectURL(svgBlob);

  const img = new Image();
  img.onload = function(){
    const dpiScale = 3; // جودة طباعة عالية
    const canvas = document.createElement("canvas");
    canvas.width = PAGE_W * dpiScale;
    canvas.height = PAGE_H * dpiScale;
    const ctx = canvas.getContext("2d");
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.scale(dpiScale, dpiScale);
    ctx.drawImage(img, 0, 0, PAGE_W, PAGE_H);
    URL.revokeObjectURL(url);

    const imgData = canvas.toDataURL("image/png");
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation: wide ? "l" : "p", unit: "pt", format: "a4" });
    pdf.addImage(imgData, "PNG", 0, 0, PAGE_W, PAGE_H);
    pdf.save(`${title}.pdf`);
  };
  img.src = url;
};
