<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>شجرة العائلة</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/4.1.1/tesseract.min.js"></script>
<link rel="stylesheet" href="styles.css?v=9">
</head>
<body>
<script>
(function(){
  // شريط سطح المكتب لا يكرر أي منطق برمجي؛ كل زر فيه فقط "يفعّل" نفس الزر الأصلي المخفي بالجوال
  window.addEventListener("DOMContentLoaded", function(){
    document.querySelectorAll("#dtSidebar .dt-nav-btn[data-target]").forEach(btn => {
      btn.addEventListener("click", () => {
        const original = document.getElementById(btn.dataset.target);
        if (original && original.style.display !== "none") original.click();
      });
    });

    // تكبير/تصغير خط آمن لسطح المكتب فقط: يضيف class على body يوسّع خط عناصرنا الجديدة تحديدًا
    // (بدل تغيير حجم الخط الجذري الذي لا يؤثر على عناصر الموقع المبنية بوحدات ثابتة أصلًا)
    const dtFontLevels = ["", "dt-font-lg", "dt-font-xl"];
    let dtFontIndex = 0;
    function applyDtFont(){
      document.body.classList.remove("dt-font-lg", "dt-font-xl");
      if (dtFontLevels[dtFontIndex]) document.body.classList.add(dtFontLevels[dtFontIndex]);
    }
    const dtFontDown = document.getElementById("dtFontDown");
    const dtFontUp = document.getElementById("dtFontUp");
    if (dtFontUp) dtFontUp.addEventListener("click", () => {
      dtFontIndex = Math.min(dtFontLevels.length - 1, dtFontIndex + 1);
      applyDtFont();
    });
    if (dtFontDown) dtFontDown.addEventListener("click", () => {
      dtFontIndex = Math.max(0, dtFontIndex - 1);
      applyDtFont();
    });

    // مزامنة ارتفاع الهيدر الفعلي مع متغير CSS لإزاحة المحتوى تحته بدقة
    const dtHeader = document.getElementById("dtHeader");
    function syncHeaderHeight(){
      if (dtHeader) document.documentElement.style.setProperty("--dt-header-h", dtHeader.offsetHeight + "px");
    }
    syncHeaderHeight();
    window.addEventListener("resize", syncHeaderHeight);
  });
})();
</script>
<div id="customAlertBackdrop"></div>
<div id="customAlertBox">
  <div id="customAlertTitle">تنبيه</div>
  <div id="customAlertMsg"></div>
  <button id="customAlertOk">حسنًا</button>
</div>
<div id="authOverlay">
  <div id="authCard">
    <h2>🌳 شجرة بني أسمل الحكمي</h2>
    <p class="sub" id="authSubtitle">سجّل الدخول للمتابعة</p>
    <input id="authUsername" type="text" placeholder="اسم المستخدم" autocomplete="username">
    <input id="authPassword" type="password" placeholder="كلمة المرور" autocomplete="current-password">
    <button id="authLoginBtn">دخول</button>
    <div id="authError"></div>
    <div id="authLoading" style="display:none">جارِ التحقق…</div>
  </div>
</div>
<div id="currentUserBadge">
  <span id="currentUserName"></span>
  <button id="logoutBtn">خروج</button>
</div>
<div id="uiScaleControls">
  <button id="uiScaleDown" title="تصغير">A-</button>
  <button id="uiScaleUp" title="تكبير">A+</button>
</div>
<div id="noViewMsg">🚫 لا تملك حاليًا صلاحية عرض المشجرة. تواصل مع محمد رشاد.</div>
<div id="nameTooltip"></div>
<div id="artBackground"><img id="bgImg" alt=""></div>
<div id="ornateFrame"></div>

<div id="tree-wrap" class="tree-hidden">
  <svg id="tree-svg"></svg>
  <div class="zoom-fab">
    <button id="zoomIn">＋</button>
    <button id="zoomOut">－</button>
    <button id="zoomReset">⟳</button>
  </div>
  <button id="exitFocus" class="exit-focus">✕ عرض الشجرة كاملة</button>
</div>

<div id="myTreeInfoPanel">
  <span id="mtiClose" title="إغلاق">✕</span>
  <h4 id="mtiName"></h4>
  <div class="mti-row"><span>عدد الأبناء</span><span id="mtiChildren">0</span></div>
  <div class="mti-row"><span>عدد الأحفاد</span><span id="mtiGrandchildren">0</span></div>
  <button id="mtiExportBtn">⬇️ تصدير PDF</button>
</div>

<div id="searchPanel" class="bottom-panel">
  <div class="searchbar" style="position:relative">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="search" type="text" placeholder="ابحث عن اسم، أو مهدي محمد أحمد…">
    <div id="searchDropdown" class="autocomplete-dropdown dropdown-up"></div>
  </div>
</div>

<div id="relPanel" class="rel-panel bottom-panel">
  <div style="position:relative">
    <input id="relA" type="text" placeholder="الاسم الأول (مثال: عبدالله مهدي محمد)">
    <div id="relADropdown" class="autocomplete-dropdown dropdown-up"></div>
  </div>
  <div style="position:relative">
    <input id="relB" type="text" placeholder="الاسم الثاني (مثال: نجيب محمد أحمد)">
    <div id="relBDropdown" class="autocomplete-dropdown dropdown-up"></div>
  </div>
  <button id="relCalc">احسب العلاقة</button>
  <div id="relResult"></div>
</div>

<div id="myTreePanel" class="rel-panel bottom-panel">
  <div style="position:relative">
    <input id="myTreeInput" type="text" placeholder="اكتب اسم الشخص، ثم اضغط عليه من القائمة">
    <div id="myTreeDropdown" class="autocomplete-dropdown dropdown-up"></div>
  </div>
</div>

<div id="ioPanel" class="bottom-panel">
  <div class="io-row">
    <button id="exportData" title="تصدير نسخة احتياطية">⬇️ نسخة احتياطية</button>
    <label id="importDataLabel" title="استيراد نسخة">⬆️ استيراد<input type="file" id="importData" accept=".json" style="display:none"></label>
  </div>
  <div class="io-row" id="migrateRow" style="display:none">
    <button id="migrateBtn" title="نقل بيانات الشجرة لقاعدة البيانات">☁️ نقل البيانات لقاعدة البيانات</button>
  </div>
  <div id="migrateStatus" style="font-size:12px; color:#666; text-align:center; margin-top:6px;"></div>
</div>

<div id="bgPanel" class="bottom-panel">
  <div class="io-row">
    <label id="bgFileLabel" title="رفع صورة أو PDF كخلفية">🖼️ رفع خلفية (صورة أو PDF)<input type="file" id="bgFileInput" accept="image/*,application/pdf" style="display:none"></label>
    <div class="bg-zoom-row">
      <button id="bgZoomOut" title="تصغير الخلفية">－</button>
      <button id="bgZoomIn" title="تكبير الخلفية">＋</button>
      <button id="bgReset" title="إعادة الضبط">⟳</button>
    </div>
    <button id="bgMoveToggle" title="تحريك الخلفية بالسحب">🖐️ تحريك الخلفية</button>
    <div class="bg-hint">فعّل التحريك ثم اسحب الخلفية، أو استخدم أزرار التكبير</div>
  </div>
</div>

<div id="usersPanel" class="bottom-panel">
  <label class="f-label">إضافة مستخدم جديد</label>
  <input type="text" id="newUserName" class="f-input" placeholder="اسم المستخدم" style="margin-bottom:8px;">
  <input type="text" id="newUserPassword" class="f-input" placeholder="كلمة المرور" style="margin-bottom:8px;">
  <div style="position:relative">
    <input type="text" id="newUserScopeInput" class="f-input" placeholder="اسم الشخص (النقطة المسموحة)، ثم اختر من القائمة" style="margin-bottom:8px;">
    <div id="newUserScopeDropdown" class="autocomplete-dropdown"></div>
  </div>
  <button id="newUserAddBtn" class="f-btn-sm" style="width:100%">➕ إضافة مستخدم</button>
  <div id="newUserStatus" style="font-size:12px; color:#666; text-align:center; margin-top:6px;"></div>

  <label class="f-label" style="margin-top:14px; display:block;">المستخدمون الحاليون</label>
  <div id="usersList" style="max-height:160px; overflow-y:auto;"></div>

  <label class="f-label" style="margin-top:14px; display:block;">📋 إضافات بانتظار الاعتماد</label>
  <div id="pendingList" style="max-height:220px; overflow-y:auto;"></div>

  <label class="f-label" style="margin-top:14px; display:block;">🎨 استايل الموقع (يظهر للجميع)</label>
  <div class="chip-list" id="themeChooser">
    <button class="f-btn-sm theme-btn" data-theme="">الافتراضي</button>
    <button class="f-btn-sm theme-btn" data-theme="royal-green">الأخضر الملكي</button>
    <button class="f-btn-sm theme-btn" data-theme="desert-gold">الذهبي الصحراوي</button>
  </div>
  <div id="themeStatus" style="font-size:12px; color:#666; text-align:center; margin-top:6px;"></div>

  <label class="f-label" style="margin-top:14px; display:block;">🖥️ تصميم الموقع (شكل الواجهة، يظهر للجميع)</label>
  <div class="chip-list" id="layoutChooser">
    <button class="f-btn-sm layout-btn" data-style="">الافتراضي</button>
    <button class="f-btn-sm layout-btn" data-style="2">لوحة التحكم</button>
    <button class="f-btn-sm layout-btn" data-style="3">المستقبلي</button>
  </div>
  <div id="layoutStatus" style="font-size:12px; color:#666; text-align:center; margin-top:6px;"></div>

  <label class="f-label" style="margin-top:14px; display:block;">🔍 فحص بيانات شخص (تنظيف الأخطاء)</label>
  <div style="position:relative">
    <div id="inspectSearchBox"></div>
  </div>
  <button id="inspectBtn" class="f-btn-sm" style="width:100%; margin-top:8px;" disabled>فحص</button>
  <div id="inspectResults" style="margin-top:10px;"></div>
</div>

<div id="recordsPanel" class="bottom-panel">
  <label class="f-label">الملفات التي فيها بيانات مسجّلة</label>
  <button id="exportAllRecordsBtn" class="f-btn-sm" style="width:100%; margin-bottom:10px; background:#0B3D2E;">⬇️ تصدير الكل بملف PDF واحد</button>
  <div id="recordsList" style="max-height:60vh; overflow-y:auto;"></div>
</div>

<header id="dtHeader">
  <div class="dt-brand">🌳 بني أسمل الحكمي</div>
  <div class="dt-font-ctrl">
    <button id="dtFontDown" title="تصغير الخط">A-</button>
    <button id="dtFontUp" title="تكبير الخط">A+</button>
  </div>
</header>

<nav id="dtSidebar">
  <div class="dt-group">
    <div class="dt-group-title">الشجرة</div>
    <button class="dt-nav-btn" data-target="toggleTree"><span class="dt-icon">🙈</span><span class="dt-label">إخفاء/إظهار الشجرة</span></button>
    <button class="dt-nav-btn" data-target="myTreeToggle"><span class="dt-icon">🌳</span><span class="dt-label">شجرتي الخاصة</span></button>
  </div>
  <div class="dt-group">
    <div class="dt-group-title">البحث والعلاقات</div>
    <button class="dt-nav-btn" data-target="searchToggle"><span class="dt-icon">🔍</span><span class="dt-label">البحث</span></button>
    <button class="dt-nav-btn" data-target="relToggle"><span class="dt-icon">🧮</span><span class="dt-label">حاسبة العلاقة</span></button>
  </div>
  <div class="dt-group">
    <div class="dt-group-title">المساعد الذكي</div>
    <button class="dt-nav-btn" data-target="aiChatToggle"><span class="dt-icon">🤖</span><span class="dt-label">المساعد الذكي</span></button>
    <button class="dt-nav-btn" data-target="attachmentsToggle"><span class="dt-icon">📚</span><span class="dt-label">المرفقات</span></button>
  </div>
  <div class="dt-group">
    <div class="dt-group-title">المظهر</div>
    <button class="dt-nav-btn" data-target="bgToggle"><span class="dt-icon">🖼️</span><span class="dt-label">خلفية الشجرة</span></button>
  </div>
  <div class="dt-group">
    <div class="dt-group-title">إدارة</div>
    <button class="dt-nav-btn" data-target="usersToggle"><span class="dt-icon">👥</span><span class="dt-label">المستخدمون</span></button>
    <button class="dt-nav-btn" data-target="recordsToggle"><span class="dt-icon">📋</span><span class="dt-label">السجلات</span></button>
    <button class="dt-nav-btn" data-target="deleteBadgeToggle"><span class="dt-icon">🗑️</span><span class="dt-label">علامات الحذف</span></button>
    <button class="dt-nav-btn" data-target="ioToggle"><span class="dt-icon">📁</span><span class="dt-label">استيراد/تصدير</span></button>
  </div>
</nav>

<div id="bottomBar">
  <button id="searchToggle" title="بحث">🔍</button>
  <button id="relToggle" title="حاسبة العلاقة">🧮</button>
  <button id="myTreeToggle" title="شجرتي الخاصة">🌳</button>
  <button id="ioToggle" title="استيراد وتصدير">📁</button>
  <button id="bgToggle" title="خلفية الشجرة">🖼️</button>
  <button id="toggleTree" title="إخفاء/إظهار المشجرة">🙈</button>
  <button id="usersToggle" title="المستخدمون" style="display:none">👥</button>
  <button id="recordsToggle" title="سجل الملفات المعبّأة" style="display:none">📋</button>
  <button id="deleteBadgeToggle" title="إظهار/إخفاء علامات الحذف" style="display:none">🗑️</button>
  <button id="aiChatToggle" title="مساعد الذكاء الاصطناعي">🤖</button>
  <button id="attachmentsToggle" title="مرفقات ومصادر إضافية" style="display:none">📚</button>
</div>

<div id="aiChatPanel" class="bottom-panel" style="max-height:65vh;">
  <div id="aiChatMessages" style="flex:1; overflow-y:auto; padding:6px 2px; display:flex; flex-direction:column; gap:10px;"></div>
  <div style="display:flex; gap:8px; align-items:center;">
    <input id="aiChatInput" type="text" class="f-input" placeholder="اسأل عن أي شخص أو علاقة في الشجرة..." style="flex:1; margin:0;">
    <button id="aiChatSend" class="f-btn-sm">إرسال</button>
  </div>
  <div id="aiChatStatus" style="font-size:12px; color:#888; text-align:center; margin-top:6px; min-height:16px;"></div>
</div>

<div id="attachmentsPanel" class="bottom-panel">
  <label class="f-label">رفع كتاب أو ملف (PDF أو Word) — يستخدمه المساعد الذكي بالإجابة</label>
  <label id="attachFileLabel" class="f-btn-sm" style="display:block; text-align:center; cursor:pointer;">
    ⬆️ اختر ملف لرفعه
    <input type="file" id="attachFileInput" accept=".pdf,.docx" style="display:none">
  </label>
  <div id="attachStatus" style="font-size:12.5px; color:#666; text-align:center; margin-top:8px; min-height:16px;"></div>

  <label class="f-label" style="margin-top:14px; display:block;">📚 المرفقات الحالية</label>
  <div id="attachmentsList" style="max-height:40vh; overflow-y:auto;"></div>
</div>

<div id="backdrop"></div>
<div id="sheet">
  <div class="handle"></div>
  <h3 id="ip-name"></h3>
  <div class="path" id="ip-path"></div>
  <div id="ip-card"></div>
</div>

<div id="infoBackdrop"></div>
<div id="infoModal">
  <div class="info-modal-header">
    <span id="infoModalName">الاسم</span>
    <span id="infoModalClose">✕</span>
  </div>
  <div class="info-tabs">
    <button class="info-tab" data-tab="addchildren">👶 إضافة أبناء</button>
    <button class="info-tab active" data-tab="info">📋 إضافة معلومات</button>
  </div>

  <div class="info-tab-content" id="tabAddChildren" style="display:none">
    <label class="f-label">اسم الابن الجديد</label>
    <div class="f-row">
      <input type="text" id="f-newSonInput" class="f-input" placeholder="اسم الابن">
      <button id="f-newSonAdd" class="f-btn-sm">إضافة</button>
    </div>
    <label class="f-label">الأبناء الحاليون</label>
    <div id="currentSonsList" class="chip-list"></div>
  </div>

  <div class="info-tab-content" id="tabInfo">
    <label class="f-label">اللقب/الشهرة</label>
    <input type="text" id="f-nickname" class="f-input" placeholder="مثال: أبو فلان / الشيخ / إلخ">

    <label class="f-label">تاريخ الميلاد (سنة هجرية)</label>
    <input type="number" id="f-birthYear" class="f-input" placeholder="مثال: 1400">

    <label class="f-label">الحالة</label>
    <div class="f-row">
      <label><input type="radio" name="deathStatus" value="alive" checked> حي يرزق</label>
      <label><input type="radio" name="deathStatus" value="dead"> متوفى</label>
    </div>
    <div id="deathYearWrap" style="display:none">
      <label class="f-label">سنة الوفاة (هجرية)</label>
      <input type="number" id="f-deathYear" class="f-input" placeholder="مثال: 1440">
    </div>

    <div class="f-age">العمر: <b id="f-ageDisplay">—</b></div>

    <label class="f-label">الوظيفة</label>
    <input type="text" id="f-job" class="f-input" placeholder="الوظيفة">

    <div id="husbandWrap" style="display:none">
      <label class="f-label">زوجها (الصهر) — اكتب الاسم الثلاثي، ثم اضغط عليه من القائمة</label>
      <div id="husbandBox" style="position:relative"></div>
      <div id="husbandResult" class="father-search-result"></div>
      <label style="display:flex; align-items:center; gap:6px; font-size:14px; margin:6px 0;">
        <input type="checkbox" id="f-husbandDivorced"> مطلّقة
      </label>
    </div>

    <label class="f-label">عدد الأبناء الذكور</label>
    <div class="f-age" id="f-sonsCount">0</div>

    <label class="f-label">الأم</label>
    <div id="motherBox" style="position:relative"></div>
    <div id="motherResult" class="father-search-result"></div>

    <label class="f-label">العدلاء من أبناء القبيلة</label>
    <div class="f-row" style="position:relative">
      <input type="text" id="f-notaryInput" class="f-input" placeholder="اكتب الاسم الرباعي، ثم اضغط على الاسم من القائمة لإضافته">
      <div id="notaryDropdown" class="autocomplete-dropdown"></div>
    </div>
    <div id="notaryList" class="chip-list"></div>

    <label class="f-label">بيانات الزوجة والأبناء</label>
    <div id="wivesList"></div>
    <button id="f-wifeAdd" class="f-btn-sm">+ إضافة زوجة</button>
    <div id="wifeTypeChooser" class="wife-type-chooser" style="display:none;">
      <button class="f-btn-sm" id="wifeTypeInside">من أبناء القبيلة</button>
      <button class="f-btn-sm" id="wifeTypeOutside">من خارج القبيلة</button>
    </div>

    <label class="f-label">نبذة تاريخية</label>
    <div class="chip-list" id="bioTagRow" style="margin-bottom:6px;">
      <button type="button" class="f-btn-sm bio-tag-btn" data-tag="قصة">قصة</button>
      <button type="button" class="f-btn-sm bio-tag-btn" data-tag="رواية">رواية</button>
      <button type="button" class="f-btn-sm bio-tag-btn" data-tag="حادثة">حادثة</button>
      <button type="button" class="f-btn-sm bio-tag-btn" data-tag="معلومة">معلومة</button>
      <button type="button" class="f-btn-sm bio-tag-btn" data-tag="نبذة تاريخية">نبذة تاريخية</button>
      <button type="button" class="f-btn-sm bio-tag-btn" data-tag="أدب">أدب</button>
    </div>
    <textarea id="f-bio" class="f-input" rows="3" placeholder="نبذة عن الشخص"></textarea>

    <label class="f-label">صورة</label>
    <input type="file" id="f-photo" accept="image/*">
    <div id="photoPreviewWrap"></div>

    <button id="f-save" class="f-save-btn">حفظ المعلومات</button>
    <button id="f-clearAll" style="width:100%; margin-top:8px; padding:10px; border:1.5px solid #8B1E1E; border-radius:10px; background:#fff; color:#8B1E1E; font-family:'Tajawal',sans-serif; font-weight:700; cursor:pointer;">🗑️ مسح كل المعلومات المضافة</button>
    <div id="f-saveMsg"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
