<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الأخبار — بني أسمل الحكمي</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
<link rel="stylesheet" href="news-styles.css?v=5">
</head>
<body>

<div id="customAlertBackdrop" class="ca-backdrop" style="display:none;">
  <div id="customAlertBox" class="ca-box">
    <div id="customAlertMsg" class="ca-msg"></div>
    <button id="customAlertOk" class="ca-ok">حسنًا</button>
  </div>
</div>

<div class="topbar">
  <a href="index.html" class="back-link" title="رجوع للشجرة">→</a>
  <div class="brand">أخبار بني أسمل الحكمي</div>
  <div class="topbar-left">
    <span id="newsUserName"></span>
    <button id="adminGearBtn" class="gear-btn" title="إعدادات الحد اليومي" style="visibility:hidden;">⚙️</button>
  </div>
</div>

<div id="authGate" class="auth-gate">جارٍ التحقق من الدخول...</div>

<div class="wrap" id="pageWrap" style="display:none;">
  <div id="feed"></div>
</div>

<!-- نافذة منبثقة لكتابة خبر/تحديث — تنبثق من الأسفل مثل نافذة دردشة، لا تفتح كصفحة مستقلة -->
<div id="composerBackdrop" class="modal-backdrop">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div id="composer"></div>
  </div>
</div>

<button class="fab" id="btnCompose" title="كتابة خبر جديد" style="display:none;">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
    <path d="M9 15h1l8-8a1.5 1.5 0 0 0-3-3l-8 8v3z"/>
  </svg>
</button>

<script src="auth.js?v=9"></script>
<script src="news.js?v=7"></script>
</body>
</html>
